  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f8fafc;min-height:100vh}
    .header{background:linear-gradient(135deg,#1e293b,#334155);padding:24px 20px 16px;text-align:center;color:#fff;position:relative}
    .header .moon{font-size:32px;display:block;margin-bottom:2px}
    .header h1{font-size:20px;font-weight:600}
    .header .deco{position:absolute;bottom:0;left:0;right:0;height:16px;background:#f8fafc;border-radius:16px 16px 0 0}
    .container{max-width:420px;margin:-8px auto 0;padding:0 16px 20px;position:relative;z-index:1}
    .card{background:#fff;border-radius:16px;box-shadow:0 1px 8px rgba(0,0,0,.06);padding:20px;margin-bottom:12px}
    .field{margin-bottom:16px}
    .field-label{font-size:13px;font-weight:500;color:#64748b;margin-bottom:6px}

    .user-bar{display:flex;align-items:center;gap:10px;padding:14px 16px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;margin-bottom:16px}
    .user-bar .av{width:38px;height:38px;border-radius:50%;background:#22c55e;color:#fff;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:600}
    .user-bar .info{flex:1}
    .user-bar .nm{font-size:16px;font-weight:600;color:#16a34a}
    .user-bar .rm{font-size:11px;color:#94a3b8}
    .user-bar .unbind{font-size:11px;color:#94a3b8;cursor:pointer;text-decoration:underline;flex-shrink:0}
    .user-bar .unbind:active{color:#ef4444}

    .srow{display:flex;gap:10px}
    .sbtn{flex:1;padding:18px 12px;border:1.5px solid #e2e8f0;border-radius:12px;text-align:center;cursor:pointer;transition:all .15s;background:#f8fafc;user-select:none}
    .sbtn:active{transform:scale(.97)}
    .sbtn .ic{font-size:24px;display:block;margin-bottom:6px}
    .sbtn .lb{font-size:16px;font-weight:500;color:#64748b}
    .sbtn.hm{border-color:#22c55e;background:#f0fdf4}
    .sbtn.hm .lb{color:#16a34a}
    .sbtn.aw{border-color:#ef4444;background:#fef2f2}
    .sbtn.aw .lb{color:#dc2626}

    #rw{overflow:hidden;max-height:0;opacity:0;transition:all .25s}
    #rw.on{max-height:140px;opacity:1}
    textarea{width:100%;padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:15px;color:#1e293b;background:#f8fafc;resize:none}
    textarea:focus{outline:none;border-color:#ef4444;background:#fff}

    .btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:17px;font-weight:600;cursor:pointer;transition:all .15s}
    .btn-pri{background:#1e293b;color:#fff}
    .btn-pri:active{background:#334155}
    .btn-pri:disabled{background:#cbd5e1;cursor:not-allowed}
    .btn-out{background:transparent;color:#3b82f6;border:1.5px solid #3b82f6}

    .done h2{font-size:18px;margin:8px 0 4px;color:#1e293b}

    .bl{text-align:center;margin-top:12px}

    .ft{text-align:center;color:#cbd5e1;font-size:11px;margin-top:16px}

<body>
<div class="header">
  <span class="moon">🌙</span>
  <h1>信管2307班晚点名系统</h1>
  <div class="deco"></div>
</div>

<div class="container">
  <div id="doneBox" class="card" style="display:none;">
    <div class="done">
      <div class="bi">✅</div>
      <h2 id="dt">今日已填写</h2>
      <div class="st" id="di"></div>
      <button class="btn btn-out" onclick="startMod()">✏️ 修改</button>
    </div>
  </div>

  <div id="formCard" class="card">
    <div class="user-bar" id="ub">
      <div class="av" id="uav"></div>
      <div class="info">
        <div class="nm" id="unm"></div>
        <div class="rm" id="urm"></div>
      </div>
      <div class="unbind" onclick="unbind()">解绑</div>
    </div>

    <div class="field">
      <div class="field-label">🏡 今晚状态</div>
      <div class="srow">
        <div class="sbtn hm" onclick="setSt('zaisushe')"><span class="ic">🏠</span><span class="lb">住校</span></div>
        <div class="sbtn" onclick="setSt('buzhusu')"><span class="ic">🚶</span><span class="lb">不住校</span></div>
      </div>
    </div>

    <div id="rw">
      <div class="field">
        <div class="field-label" style="color:#dc2626;">📝 不住校事由 <span style="color:#ef4444;">*必填</span></div>
        <textarea id="ri" rows="2" placeholder="请填写理由…" oninput="ck()"></textarea>
      </div>
    </div>

    <button class="btn btn-pri" id="sb" onclick="sub()" disabled>请先绑定身份</button>
  </div>

  <div class="bl"><a href="index.html">🏠 返回首页</a></div>
  <div class="ft">信管2307班晚点名系统 · SVIP专属定制版</div>
</div>

<script>
  const API = SUPABASE_URL + '/rest/v1/checkins';
  const H = {'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY,'Content-Type':'application/json'};

  let st='zaisushe',rec=null,boundStudent=null,modMode=false;
  const td=new Date().toISOString().slice(0,10);

  // ===== 维护模式检查 =====
  (function(){
    if(localStorage.getItem('debug_mode')==='1')return;
    var x=new XMLHttpRequest();
    x.open('GET',SUPABASE_URL+'/rest/v1/settings?select=value&key=eq.maintenance');
    x.setRequestHeader('apikey',SUPABASE_ANON_KEY);
    x.setRequestHeader('Authorization','Bearer '+SUPABASE_ANON_KEY);
    x.onload=function(){
      if(x.status===200){
        try{
          var d=JSON.parse(x.responseText);
          if(d.length>0&&d[0].value==='1'){
            document.body.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#f8fafc;padding:40px;text-align:center"><div style="font-size:64px;margin-bottom:16px">🔧</div><h2 style="font-size:22px;color:#1e293b;margin-bottom:8px">系统维护中</h2><p style="color:#94a3b8;max-width:300px">系统正在升级维护，暂不可用，请稍后再来～</p></div>';
          }
        }catch(e){}
      }
    };
    x.send();
  })();

  // ===== 解绑 =====
  function unbind(){
    if(!confirm('解除绑定后需要重新绑定才能填写，确定吗？')) return;
    localStorage.removeItem('wdm_name');
    localStorage.removeItem('wdm_sid');
    location.href='index.html';
  }

  // ===== 检查绑定 =====
  const sn=localStorage.getItem('wdm_name'),ss=localStorage.getItem('wdm_sid');
  if(!sn||!ss||!STUDENTS.find(x=>x.name===sn&&x.sid===ss)){
    location.href='index.html'; // 未绑定，回首页
  } else {
    boundStudent=STUDENTS.find(x=>x.name===sn&&x.sid===ss);
    document.getElementById('uav').textContent=boundStudent.name[0];
    document.getElementById('unm').textContent=boundStudent.name;
    document.getElementById('urm').textContent='学号: '+boundStudent.sid+' · '+boundStudent.room;
    document.getElementById('sb').textContent='提交';
  }

  // ===== 查记录 =====
  async function fetchRec(name){
    try{const r=await fetch(API+'?date=eq.'+td+'&name=eq.'+encodeURIComponent(name)+'&select=*',{headers:H});if(!r.ok)return null;const d=await r.json();return d&&d.length?d[0]:null;}catch(e){return null}
  }

  if(boundStudent){
    fetchRec(boundStudent.name).then(d=>{if(d){rec=d;document.getElementById('doneBox').style.display='block';document.getElementById('formCard').style.display='none';document.getElementById('dt').textContent='今日已填写 - '+d.name;document.getElementById('di').textContent=(d.status==='zaisushe'?'🏠 住校':'🚶 不住校')+(d.note?' · '+d.note:'');}});
  }

  function startMod(){
    if(!boundStudent)return;
    modMode=true;
    document.getElementById('doneBox').style.display='none';document.getElementById('formCard').style.display='block';
    if(rec){setSt(rec.status);if(rec.status==='buzhusu'&&rec.note)document.getElementById('ri').value=rec.note;}
    document.getElementById('sb').textContent='✏️ 修改提交';ck();
  }

  // ===== 状态 =====
  function setSt(v){st=v;document.querySelectorAll('.sbtn').forEach(b=>b.classList.remove('hm','aw'));const bs=document.querySelectorAll('.sbtn');if(v==='zaisushe')bs[0].classList.add('hm');else bs[1].classList.add('aw');document.getElementById('rw').classList.toggle('on',v==='buzhusu');ck();}
  setSt('zaisushe');
  function ck(){const btn=document.getElementById('sb');const r=document.getElementById('ri').value.trim();btn.disabled=!(st==='zaisushe'||r);}

  // ===== 提交 =====
  async function sub(){
    if(!boundStudent)return;
    const name=boundStudent.name,room=boundStudent.room,sid=boundStudent.sid;
    const reason=st==='buzhusu'?document.getElementById('ri').value.trim():'';
    if(st==='buzhusu'&&!reason)return;
    const btn=document.getElementById('sb');btn.disabled=true;btn.textContent='提交中…';
    try{
      const exist=modMode?rec:await fetchRec(name);
      let r;
      if(exist)r=await fetch(API+'?date=eq.'+td+'&name=eq.'+encodeURIComponent(name),{method:'PATCH',headers:H,body:JSON.stringify({status:st,note:reason,room,student_id:sid})});
      else r=await fetch(API,{method:'POST',headers:H,body:JSON.stringify({date:td,name,room,status:st,note:reason,student_id:sid})});
      if(r.ok||r.status===201||r.status===204||r.status===200){
        btn.textContent='✅ 已提交';
        document.getElementById('doneBox').style.display='block';document.getElementById('formCard').style.display='none';
        document.getElementById('dt').textContent='今日已填写 - '+name;
        document.getElementById('di').textContent=(st==='zaisushe'?'🏠 住校':'🚶 不住校')+(reason?' · '+reason:'');
        modMode=false;btn.textContent='提交';
      }else{const e=await r.json().catch(()=>({}));alert('提交失败：'+(e.message||'请稍后再试'));btn.disabled=false;btn.textContent='提交';}
    }catch(e){alert('网络异常，请重试');btn.disabled=false;btn.textContent='提交';}
  }
</script>
