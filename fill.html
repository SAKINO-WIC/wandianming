<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>晚点名 · 填写</title>
  <script src="js/config.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      padding: 0;
    }

    /* ===== Header ===== */
    .header {
      background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
      padding: 28px 20px 20px;
      text-align: center;
      color: white;
      position: relative;
    }
    .header .moon {
      font-size: 36px;
      display: block;
      margin-bottom: 4px;
    }
    .header h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 2px;
    }
    .header .date {
      font-size: 13px;
      opacity: 0.7;
      margin-top: 4px;
    }
    .header .deco {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 16px;
      background: #f8fafc;
      border-radius: 16px 16px 0 0;
    }

    /* ===== Card ===== */
    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 0 16px 20px;
      margin-top: -8px;
      position: relative;
      z-index: 1;
    }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 1px 8px rgba(0,0,0,0.06);
      padding: 20px;
      margin-bottom: 12px;
    }

    /* ===== Form ===== */
    .field {
      margin-bottom: 16px;
    }
    .field:last-child { margin-bottom: 0; }
    .field-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      color: #64748b;
      margin-bottom: 6px;
    }
    .field-label .badge {
      background: #e2e8f0;
      color: #94a3b8;
      font-size: 11px;
      padding: 1px 8px;
      border-radius: 8px;
    }
    select, input, textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 16px;
      color: #1e293b;
      background: #f8fafc;
      transition: all 0.15s;
    }
    select:focus, input:focus, textarea:focus {
      outline: none;
      border-color: #3b82f6;
      background: white;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
    }
    select { appearance: auto; }

    /* ===== Status buttons ===== */
    .status-row {
      display: flex;
      gap: 10px;
    }
    .status-btn {
      flex: 1;
      padding: 16px 12px;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
      background: #f8fafc;
      user-select: none;
    }
    .status-btn:active { transform: scale(0.97); }
    .status-btn .icon { font-size: 22px; display: block; margin-bottom: 4px; }
    .status-btn .label { font-size: 15px; font-weight: 500; color: #64748b; }
    .status-btn.active-home {
      border-color: #22c55e;
      background: #f0fdf4;
    }
    .status-btn.active-home .label { color: #16a34a; }
    .status-btn.active-away {
      border-color: #ef4444;
      background: #fef2f2;
    }
    .status-btn.active-away .label { color: #dc2626; }

    /* ===== Reason ===== */
    #reasonWrap {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: all 0.25s ease;
    }
    #reasonWrap.open {
      max-height: 120px;
      opacity: 1;
    }

    /* ===== Submit ===== */
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary {
      background: #1e293b;
      color: white;
    }
    .btn-primary:active { background: #334155; }
    .btn-primary:disabled {
      background: #cbd5e1;
      cursor: not-allowed;
    }

    /* ===== Messages ===== */
    .msg {
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 12px;
      display: none;
    }
    .msg.show { display: flex; align-items: center; gap: 8px; }
    .msg.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .msg.error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .msg.loading { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }

    /* ===== Done state ===== */
    .done-box {
      text-align: center;
      padding: 30px 20px;
    }
    .done-box .big-icon { font-size: 52px; }
    .done-box h2 {
      font-size: 20px;
      margin: 12px 0 4px;
      color: #1e293b;
    }
    .done-box .sub {
      color: #94a3b8;
      font-size: 14px;
    }

    /* ===== Admin link ===== */
    .admin-link {
      text-align: center;
      margin-top: 12px;
    }
    .admin-link a {
      color: #94a3b8;
      font-size: 12px;
      text-decoration: none;
    }
    .footer {
      text-align: center;
      color: #cbd5e1;
      font-size: 11px;
      margin-top: 16px;
    }
  </style>
</head>
<body>

  <div class="header">
    <span class="moon">🌙</span>
    <h1>晚点名</h1>
    <div class="date" id="todayDate"></div>
    <div class="deco"></div>
  </div>

  <div class="container">
    <!-- Message -->
    <div id="msg" class="msg"></div>

    <!-- Done state -->
    <div id="doneBox" class="card" style="display:none;">
      <div class="done-box">
        <div class="big-icon">✅</div>
        <h2>今日已填写</h2>
        <div class="sub" id="doneStatus"></div>
      </div>
    </div>

    <!-- Form -->
    <div id="formCard" class="card">
      <!-- 宿舍 -->
      <div class="field">
        <div class="field-label">
          🏠 宿舍 <span class="badge">选填，可快速筛选</span>
        </div>
        <select id="dormSelect" onchange="onDormChange()">
          <option value="">全部宿舍</option>
        </select>
      </div>

      <!-- 姓名 -->
      <div class="field">
        <div class="field-label">👤 姓名</div>
        <div id="nameInputArea">
          <select id="nameSelect" onchange="onNameSelect()">
            <option value="">请选择姓名</option>
          </select>
        </div>
        <div style="text-align:right;margin-top:4px;">
          <span id="toggleNameMode" style="color:#3b82f6;font-size:13px;cursor:pointer;">✏️ 手动输入</span>
        </div>
      </div>

      <!-- 住校情况 -->
      <div class="field">
        <div class="field-label">🏡 今晚状态</div>
        <div class="status-row">
          <div class="status-btn active-home" data-val="zaisushe" onclick="setStatus(this,'zaisushe')">
            <span class="icon">🏠</span>
            <span class="label">住校</span>
          </div>
          <div class="status-btn" data-val="buzhusu" onclick="setStatus(this,'buzhusu')">
            <span class="icon">🚶</span>
            <span class="label">不住校</span>
          </div>
        </div>
      </div>

      <!-- 不住校理由 -->
      <div id="reasonWrap">
        <div class="field">
          <div class="field-label" style="color:#dc2626;">
            📝 不住校事由 <span style="color:#ef4444;">*必填</span>
          </div>
          <textarea id="reasonInput" rows="2" placeholder="请填写理由，如：回家、请假、外出…" oninput="checkForm()"></textarea>
        </div>
      </div>

      <!-- 提交 -->
      <button class="btn btn-primary" id="submitBtn" onclick="submitForm()">提交</button>
    </div>

    <div class="admin-link"><a href="admin.html">📊 管理看板</a></div>
    <div class="footer">信管2307 · 晚点名系统</div>
  </div>

  <script>
    const API = SUPABASE_URL + '/rest/v1/checkins';
    const HEADERS = {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
      'Content-Type': 'application/json',
    };

    let selectedStatus = 'zaisushe';
    let isManual = false;
    const todayStr = new Date().toISOString().slice(0,10);

    // ===== 日期 =====
    const weekdays = ['日','一','二','三','四','五','六'];
    const d = new Date();
    document.getElementById('todayDate').textContent =
      `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 星期${weekdays[d.getDay()]}`;

    // ===== 加载宿舍选项 =====
    const dorms = [...new Set(STUDENTS.map(s => s.room))].sort();
    const dormSel = document.getElementById('dormSelect');
    dorms.forEach(r => {
      const opt = document.createElement('option');
      opt.value = r;
      opt.textContent = r;
      dormSel.appendChild(opt);
    });

    // ===== 加载姓名 =====
    function loadNames(filterDorm) {
      const sel = document.getElementById('nameSelect');
      const currentVal = sel.value;
      sel.innerHTML = '<option value="">请选择姓名</option>';

      let list = STUDENTS;
      if (filterDorm) {
        list = STUDENTS.filter(s => s.room === filterDorm);
      }
      list.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.name;
        opt.textContent = s.name;
        sel.appendChild(opt);
      });

      // 恢复上次选中
      if (currentVal && list.some(s => s.name === currentVal)) {
        sel.value = currentVal;
      }
    }

    // ===== 宿舍变化 =====
    function onDormChange() {
      const dorm = document.getElementById('dormSelect').value;
      loadNames(dorm);
      checkForm();
    }

    // ===== 切换选名模式 =====
    const savedName = localStorage.getItem('wdm_name') || '';
    document.getElementById('toggleNameMode').addEventListener('click', function() {
      isManual = !isManual;
      const area = document.getElementById('nameInputArea');
      if (isManual) {
        area.innerHTML = '<input type="text" id="manualName" placeholder="直接输入姓名" maxlength="10" oninput="checkForm()">';
        if (savedName && !STUDENTS.some(s => s.name === savedName)) {
          document.getElementById('manualName').value = savedName;
        }
        this.textContent = '📋 从列表选择';
      } else {
        area.innerHTML =
          `<select id="nameSelect" onchange="onNameSelect()"><option value="">请选择姓名</option></select>`;
        loadNames(document.getElementById('dormSelect').value);
        if (savedName) {
          const sel = document.getElementById('nameSelect');
          if ([...sel.options].some(o => o.value === savedName)) {
            sel.value = savedName;
          }
        }
        this.textContent = '✏️ 手动输入';
      }
      checkForm();
    });

    function onNameSelect() {
      const name = document.getElementById('nameSelect').value;
      if (name) {
        localStorage.setItem('wdm_name', name);
      }
      checkForm();
    }

    // ===== 状态 =====
    function setStatus(el, val) {
      selectedStatus = val;
      document.querySelectorAll('.status-btn').forEach(b => {
        b.classList.remove('active-home', 'active-away');
      });
      el.classList.add(val === 'zaisushe' ? 'active-home' : 'active-away');

      const wrap = document.getElementById('reasonWrap');
      if (val === 'buzhusu') {
        wrap.classList.add('open');
      } else {
        wrap.classList.remove('open');
      }
      checkForm();
    }
    // 默认选中住校
    document.querySelector('.status-btn.active-home').classList.add('active-home');

    // ===== 检查 =====
    function getName() {
      if (isManual) {
        return (document.getElementById('manualName')?.value || '').trim();
      }
      return document.getElementById('nameSelect')?.value || '';
    }

    function checkForm() {
      const name = getName();
      const reason = document.getElementById('reasonInput').value.trim();
      const reasonOk = selectedStatus === 'zaisushe' || reason.length > 0;
      document.getElementById('submitBtn').disabled = !(name && reasonOk);
    }

    // ===== 查已提交 =====
    async function checkAlready() {
      const name = savedName;
      if (!name) return;

      try {
        const r = await fetch(API + '?date=eq.' + todayStr + '&name=eq.' + encodeURIComponent(name) + '&select=*', {
          headers: HEADERS
        });
        if (!r.ok) return;
        const data = await r.json();
        if (data && data.length > 0) {
          const rec = data[0];
          document.getElementById('doneBox').style.display = 'block';
          document.getElementById('formCard').style.display = 'none';
          document.getElementById('doneStatus').textContent =
            rec.status === 'zaisushe' ? '🏠 住校' : '🚶 不住校' + (rec.note ? ' · ' + rec.note : '');
        }
      } catch(e) {}
    }

    // ===== 提交 =====
    async function submitForm() {
      const name = getName();
      if (!name) return showMsg('请填写姓名', 'error');

      const dorm = document.getElementById('dormSelect').value;
      const student = STUDENTS.find(s => s.name === name);
      const room = student ? student.room : (dorm || '');

      const status = selectedStatus;
      const reason = status === 'buzhusu' ? document.getElementById('reasonInput').value.trim() : '';
      if (status === 'buzhusu' && !reason) return showMsg('不住校请填写事由', 'error');

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = '提交中…';
      showMsg('正在提交…', 'loading');

      try {
        const r = await fetch(API, {
          method: 'POST',
          headers: HEADERS,
          body: JSON.stringify({
            date: todayStr,
            name, room, status,
            note: reason,
          })
        });

        if (r.status === 201) {
          showMsg('✅ 提交成功！', 'success');
          btn.textContent = '✅ 已提交';
          document.getElementById('doneBox').style.display = 'block';
          document.getElementById('formCard').style.display = 'none';
          document.getElementById('doneStatus').textContent =
            status === 'zaisushe' ? '🏠 住校' : '🚶 不住校' + (reason ? ' · ' + reason : '');
          localStorage.setItem('wdm_name', name);
        } else {
          const err = await r.json();
          if (r.status === 400 && err.message && err.message.includes('duplicate')) {
            showMsg('今天已经提交过了 ✅', 'success');
            document.getElementById('doneBox').style.display = 'block';
            document.getElementById('formCard').style.display = 'none';
          } else {
            showMsg('提交失败：' + (err.message || '请稍后再试'), 'error');
            btn.disabled = false;
            btn.textContent = '提交';
          }
        }
      } catch(e) {
        showMsg('网络异常，请检查网络后重试', 'error');
        btn.disabled = false;
        btn.textContent = '提交';
      }
    }

    function showMsg(text, type) {
      const m = document.getElementById('msg');
      m.textContent = text;
      m.className = 'msg show ' + type;
      if (type === 'success') {
        setTimeout(() => m.classList.remove('show'), 3000);
      }
    }

    // ===== 初始化 =====
    loadNames('');

    // 恢复上次选择的宿舍和姓名
    if (savedName) {
      const student = STUDENTS.find(s => s.name === savedName);
      if (student) {
        document.getElementById('dormSelect').value = student.room;
        loadNames(student.room);
        document.getElementById('nameSelect').value = savedName;
      } else {
        // 不在名单里 → 切手动
        document.getElementById('toggleNameMode').click();
        document.getElementById('manualName').value = savedName;
      }
      checkAlready();
    }
  </script>
</body>
</html>
