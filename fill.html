// ===== 绑定页 =====
function rp(a){var p=document.getElementById('np');if(!a||a.length===0){p.innerHTML='<div class="empty">无匹配</div>';return;}var h='';for(var i=0;i<a.length;i++){h+='<div class="it" onclick="pn(\''+a[i][0]+'\',\''+a[i][1]+'\')">'+a[i][0]+'<span class="rt">'+a[i][2]+'</span></div>';}p.innerHTML=h;}
function fl(){var d=document.getElementById('bd').value;var l=STUDENTS;if(d){l=[];for(var i=0;i<STUDENTS.length;i++){if(STUDENTS[i][2]===d)l.push(STUDENTS[i]);}}rp(l);}
function op(){var t=document.getElementById('bn').value.trim();var d=document.getElementById('bd').value;var l=STUDENTS;if(d){l=[];for(var i=0;i<STUDENTS.length;i++){if(STUDENTS[i][2]===d)l.push(STUDENTS[i]);}}if(t){var f=[];for(var i=0;i<l.length;i++){if(l[i][0].indexOf(t)>=0)f.push(l[i]);}l=f;}rp(l);document.getElementById('np').className='np on';}
function cp(){document.getElementById('np').className='np';}
function pn(n,s){document.getElementById('bn').value=n;document.getElementById('bs').value=s;cp();}
document.getElementById('bd').onchange=function(){fl();};
document.getElementById('bn').oninput=function(){if(document.getElementById('np').className.indexOf('on')>=0)op();var v=this.value.trim();for(var i=0;i<STUDENTS.length;i++){if(STUDENTS[i][0]===v){document.getElementById('bs').value=STUDENTS[i][1];break;}}};
document.getElementById('bn').onfocus=function(){op();};
document.getElementById('bn').onblur=function(){var t=this;setTimeout(function(){cp();},200);};
document.getElementById('ndb').onclick=function(){if(document.getElementById('np').className.indexOf('on')>=0)cp();else op();};
document.getElementById('bs').oninput=function(){var s=this.value.trim();if(s.length===10){for(var i=0;i<STUDENTS.length;i++){if(STUDENTS[i][1]===s){document.getElementById('bn').value=STUDENTS[i][0];break;}}}};

function sm(t,type){var m=document.getElementById('msg');m.textContent=t;m.className='msg on '+type;setTimeout(function(){m.className='msg';},3000);}

document.getElementById('bb').onclick=function(){
  var n=document.getElementById('bn').value.trim();
  var s=document.getElementById('bs').value.trim();
  if(!n){sm('⚠️ 请填写姓名','err');return;}
  if(s.length!==10){sm('⚠️ 请输入完整的10位学号','err');return;}
  var si=null;for(var i=0;i<STUDENTS.length;i++){if(STUDENTS[i][0]===n&&STUDENTS[i][1]===s){si=i;break;}}

    for(var i=0;i<STUDENTS.length;i++){if(STUDENTS[i][1]===s){sm('⚠️ 姓名与学号不匹配，你是否是「'+STUDENTS[i][0]+'」？','err');return;}}

  }
  localStorage.setItem('wdm_name',n);
  localStorage.setItem('wdm_sid',s);
  // 显示填表页
  var stu=STUDENTS[si];window.bs=stu;
  document.getElementById('bp').style.display='none';
  document.getElementById('fp').style.display='block';

  document.getElementById('unm').textContent=stu[0];
  document.getElementById('urm').textContent='学号: '+stu[1]+' · '+stu[2];
  document.getElementById('sb').disabled=true;
  document.getElementById('sb').textContent='提交';
  cf(); // 根据默认"住校"状态启用提交按钮
  // 查记录
  var x=new XMLHttpRequest();
  x.open('GET',SUPABASE_URL+'/rest/v1/checkins?date=eq.'+new Date().toISOString().slice(0,10)+'&name=eq.'+encodeURIComponent(stu[0])+'&select=*');
  x.setRequestHeader('apikey',SUPABASE_ANON_KEY);
  x.setRequestHeader('Authorization','Bearer '+SUPABASE_ANON_KEY);
  x.onload=function(){if(x.status===200){try{var d=JSON.parse(x.responseText);if(d&&d.length>0){window.rec=d[0];document.getElementById('dbx').style.display='block';document.getElementById('fp').style.display='none';document.getElementById('dt').textContent='今日已填写 - '+d[0].name;document.getElementById('di').textContent=(d[0].status==='zaisushe'?'🏠 住校':'🚶 不住校')+(d[0].note?' · '+d[0].note:'');}}catch(e){}}};

};

// ===== 解绑（用户主动操作）=====
function ub(){
  if(!confirm('解除绑定后需要重新绑定才能填写，确定吗？'))return;
  localStorage.removeItem('wdm_name');
  localStorage.removeItem('wdm_sid');

// ===== 切换到绑定页（无弹窗）=====
function goBind(){
  window.bs=null;window.rec=null;window.mod=false;

  document.getElementById('dbx').style.display='none';
  document.getElementById('bp').style.display='block';

// ===== 填表页 =====
var cst='zaisushe';
function ss(v){cst=v;document.querySelectorAll('.sbtn')[0].className='sbtn'+(v==='zaisushe'?' hm':'');document.querySelectorAll('.sbtn')[1].className='sbtn'+(v==='buzhusu'?' aw':'');document.getElementById('rw').className=v==='buzhusu'?'on':'';cf();}
function cf(){var r=document.getElementById('ri').value.trim();document.getElementById('sb').disabled=!(cst==='zaisushe'||r);}

function sm2(){
  document.getElementById('dbx').style.display='none';
  document.getElementById('fp').style.display='block';
  if(window.rec){ss(window.rec.status);if(window.rec.status==='buzhusu'&&window.rec.note)document.getElementById('ri').value=window.rec.note;}
  document.getElementById('sb').textContent='✏️ 修改提交';
  window.mod=true;cf();

function doSub(){
  // 从 localStorage 获取绑定信息
  var storedName=localStorage.getItem('wdm_name'),storedSid=localStorage.getItem('wdm_sid');
  if(!storedName||!storedSid){goBind();return;}
  var si=null;for(var i=0;i<STUDENTS.length;i++){if(STUDENTS[i][0]===storedName&&STUDENTS[i][1]===storedSid){si=i;break;}}
  if(si===null){goBind();return;}
  window.bs=STUDENTS[si];
  var name=window.bs[0],room=window.bs[2],sid=window.bs[1];
  var reason=cst==='buzhusu'?document.getElementById('ri').value.trim():'';
  if(cst==='buzhusu'&&!reason)return;
  var btn=document.getElementById('sb');btn.disabled=true;btn.textContent='提交中…';
  var td=new Date().toISOString().slice(0,10);
  // 统一用 POST + upsert（by date+name 唯一约束）
  // 首次提交 → INSERT；修改 → 自动覆盖（upsert）
  var x=new XMLHttpRequest();
  x.open('POST',SUPABASE_URL+'/rest/v1/checkins?on_conflict=date,name');
  x.setRequestHeader('apikey',SUPABASE_ANON_KEY);
  x.setRequestHeader('Authorization','Bearer '+SUPABASE_ANON_KEY);
  x.setRequestHeader('Content-Type','application/json');
  x.setRequestHeader('Prefer','resolution=merge-duplicates');
  x.onload=function(){
    if(x.status===201||x.status===200){
      btn.textContent='✅ 已提交';
      document.getElementById('dbx').style.display='block';document.getElementById('fp').style.display='none';
      document.getElementById('dt').textContent='今日已填写 - '+name;
      document.getElementById('di').textContent=(cst==='zaisushe'?'🏠 住校':'🚶 不住校')+(reason?' · '+reason:'');
      window.mod=false;btn.textContent='提交';
    }else{sm('提交失败('+x.status+')','err');btn.disabled=false;btn.textContent='提交';}
  };
  x.onerror=function(){sm('网络异常','err');btn.disabled=false;btn.textContent='提交';};
  x.send(JSON.stringify({date:td,name:name,room:room,status:cst,note:reason,student_id:sid}));
}

// ===== 安全密码输入弹窗 =====
function safePrompt(callback){
  var div=document.createElement('div');
  div.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:99999;display:flex;align-items:center;justify-content:center';
  div.innerHTML='<div style="background:#fff;border-radius:16px;padding:24px;width:300px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.15)"><p style="font-size:15px;color:#1e293b;margin-bottom:16px">🔑 输入管理员密码</p><input type="password" id="spi" style="width:100%;padding:12px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:16px;text-align:center" placeholder="密码"><div style="display:flex;gap:8px;margin-top:14px"><button id="spc" style="flex:1;padding:10px;border:1.5px solid #e2e8f0;border-radius:10px;background:#fff;font-size:15px;cursor:pointer">取消</button><button id="spo" style="flex:1;padding:10px;border:none;border-radius:10px;background:#1e293b;color:#fff;font-size:15px;cursor:pointer">确认</button></div></div>';
  document.body.appendChild(div);
  var inp=document.getElementById('spi');
  document.getElementById('spc').onclick=function(){document.body.removeChild(div);};
  document.getElementById('spo').onclick=function(){var v=inp.value.trim();document.body.removeChild(div);callback(v);};
  inp.onkeydown=function(e){if(e.key==='Enter'){var v=this.value.trim();document.body.removeChild(div);callback(v);}};
  setTimeout(function(){inp.focus();},100);
}
var mc=0,mt=null;
function tm(){mc++;clearTimeout(mt);mt=setTimeout(function(){mc=0;},1500);if(mc>=7){mc=0;var e=document.getElementById('ae');e.className=e.className.indexOf('on')>=0?'':'on';}}

fl();
var storedName=localStorage.getItem('wdm_name'),storedSid=localStorage.getItem('wdm_sid');
if(storedName&&storedSid){for(var i=0;i<STUDENTS.length;i++){if(STUDENTS[i][0]===storedName&&STUDENTS[i][1]===storedSid){document.getElementById('bn').value=storedName;document.getElementById('bs').value=storedSid;document.getElementById('bb').click();break;}}}

// ===== 日期与倒计时 =====
var ctInterval=null;
function updateClock(){
  var d=new Date();var wd=['日','一','二','三','四','五','六'];
  document.getElementById('hdate').textContent=d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日 星期'+wd[d.getDay()];
  var end=window.wdm_fill_end||'21:00';var ep=end.split(':');
  var target=new Date();target.setHours(parseInt(ep[0]),parseInt(ep[1]),0,0);
  if(target<=d)target.setDate(target.getDate()+1);
  var diff=Math.floor((target-d)/1000);
  if(diff<=0){document.getElementById('hcount').textContent='⏰ 今日晚点名已结束';}
  else{var h=Math.floor(diff/3600);var m=Math.floor((diff%3600)/60);var s=diff%60;
    document.getElementById('hcount').textContent='⏳ 距截止还有 '+h+'时'+m+'分'+s+'秒';}
}
function startClock(){updateClock();if(ctInterval)clearInterval(ctInterval);ctInterval=setInterval(function(){if(!document.hidden)updateClock();},1000);}
setTimeout(startClock,500);

window.addEventListener('pageshow',function(){

// ===== 宿舍全景 =====
var dpData=null,dpDorm=null,dpFilter='all',dpFmt='name';
function dp(){
  document.getElementById('dpo').className='dp-overlay on';
  var myDorm='';var sn=localStorage.getItem('wdm_name');
  if(sn){for(var i=0;i<STUDENTS.length;i++){if(STUDENTS[i][0]===sn){myDorm=STUDENTS[i][2];break;}}}
  dpDorm=myDorm;
  var td=new Date().toISOString().slice(0,10);
  var x=new XMLHttpRequest();
  x.open('GET',SUPABASE_URL+'/rest/v1/checkins?date=eq.'+td+'&select=*');
  x.setRequestHeader('apikey',SUPABASE_ANON_KEY);
  x.setRequestHeader('Authorization','Bearer '+SUPABASE_ANON_KEY);
  x.onload=function(){
    if(x.status===200){try{dpData=JSON.parse(x.responseText);}catch(e){dpData=[];}
    }else dpData=[];renderDP();
  };
  x.onerror=function(){dpData=[];renderDP();};
  x.send();
}
function dc(){document.getElementById('dpo').className='dp-overlay';}
function renderDP(){
  var list=document.getElementById('dpl');var tabs=document.getElementById('dpt');var summary=document.getElementById('dps');
  var filterEl=document.getElementById('dpFilter');
  if(!dpData)dpData=[];var filled=new Set(dpData.map(function(r){return r.name;}));var filledMap={};dpData.forEach(function(r){filledMap[r.name]=r;});
  var rooms={};for(var i=0;i<STUDENTS.length;i++){var r=STUDENTS[i][2];if(!rooms[r])rooms[r]=[];rooms[r].push(STUDENTS[i]);}
  var roomKeys=Object.keys(rooms).sort();var totalAll=STUDENTS.length,doneAll=dpData.length;
  // 宿舍标签
  var th='<div class="dp-tab'+(dpDorm===''||!dpDorm?' on':'')+'" onclick="ds(\'\')">全部 <span class="cnt">'+doneAll+'/'+totalAll+'</span></div>';
  for(var i=0;i<roomKeys.length;i++){var r=roomKeys[i];var total=rooms[r].length;var done=rooms[r].filter(function(s){return filled.has(s[0]);}).length;th+='<div class="dp-tab'+(r===dpDorm?' on':'')+'" onclick="ds(\''+r+'\')">'+r+' <span class="cnt">'+done+'/'+total+'</span></div>';}
  tabs.innerHTML=th;
  setTimeout(function(){var el=tabs.querySelector('.on');if(el)el.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});},50);
  // 状态筛选
  var missAll=totalAll-doneAll;
  var filters=[['all','所有',totalAll],['miss','未填',missAll],['zaisushe','住校',doneAll],['buzhusu','不住校',dpData.filter(function(r){return r.status==='buzhusu';}).length]];
  var fh='';for(var i=0;i<filters.length;i++){var f=filters[i];fh+='<div class="dp-fbtn'+(dpFilter===f[0]?' on':'')+'" onclick="setFilter(\''+f[0]+'\')">'+f[1]+' <span class="cnt">'+f[2]+'</span></div>';}
  filterEl.innerHTML=fh;
  // 获取当前范围的学生
  var students=(dpDorm===''||!dpDorm)?[].concat.apply([],roomKeys.map(function(r){return rooms[r];})):(rooms[dpDorm]||[]);
  // 应用筛选
  var filtered=students.filter(function(s){
    if(dpFilter==='all')return true;
    if(dpFilter==='miss')return !filled.has(s[0]);
    var rec=filledMap[s[0]];if(!rec)return false;
    return rec.status===dpFilter;
  });
  // 按宿舍分组渲染
  var grpRooms={};for(var i=0;i<filtered.length;i++){var s=filtered[i];var r=s[2];if(!grpRooms[r])grpRooms[r]=[];grpRooms[r].push(s);}
  var grpKeys=Object.keys(grpRooms).sort();
  if(dpDorm!==''&&dpDorm){grpKeys=[dpDorm];grpRooms={};for(var i=0;i<filtered.length;i++){var s=filtered[i];if(!grpRooms[s[2]])grpRooms[s[2]]=[];grpRooms[s[2]].push(s);}}
  var h='';for(var i=0;i<grpKeys.length;i++){
    var rname=grpKeys[i];var sts=grpRooms[rname];
    if(filtered.length!==sts.length||dpDorm===''||!dpDorm)h+='<div class="dp-grp">── '+rname+' ('+sts.length+'人) ──</div>';
    for(var j=0;j<sts.length;j++){var s=sts[j];var isFilled=filled.has(s[0]);var dotCls='miss';var label='未填写';if(isFilled){var rec=filledMap[s[0]];dotCls=rec.status==='buzhusu'?'away':'ok';label=rec.status==='buzhusu'?'不住校'+(rec.note?' · '+rec.note:''):'住校';}h+='<div class="dp-row"><div class="nm">'+s[0]+'<span class="rm">'+s[2]+'</span></div><div style="display:flex;align-items:center;gap:6px"><span style="font-size:12px;color:'+(isFilled?'#64748b':'#94a3b8')+'">'+label+'</span><div class="dp-dot '+dotCls+'"></div></div></div>';}
  }
  list.innerHTML=h||'<div class="dp-nobind">暂无匹配</div>';
  var fDone=filtered.filter(function(s){return filled.has(s[0]);}).length;
  summary.textContent='✅ '+fDone+'/'+filtered.length+' 已筛选'+(filtered.length<totalAll?' · 共'+totalAll+'人':'');
  list.scrollTop=0;
}
function setFilter(f){dpFilter=f;renderDP();}
function setFmt(f){dpFmt=f;document.querySelectorAll('.dp-fmt').forEach(function(e){e.className='dp-fmt'+(e.getAttribute('onclick').indexOf(f)>=0?' on':'');});}
function copyFiltered(){
  var rooms={};for(var i=0;i<STUDENTS.length;i++){var r=STUDENTS[i][2];if(!rooms[r])rooms[r]=[];rooms[r].push(STUDENTS[i]);}
  var roomKeys=Object.keys(rooms).sort();
  var filled=new Set((dpData||[]).map(function(r){return r.name;}));
  var filledMap={};(dpData||[]).forEach(function(r){filledMap[r.name]=r;});
  var students=(dpDorm===''||!dpDorm)?[].concat.apply([],roomKeys.map(function(r){return rooms[r];})):(rooms[dpDorm]||[]);
  var filtered=students.filter(function(s){
    if(dpFilter==='all')return true;
    if(dpFilter==='miss')return !filled.has(s[0]);
    var rec=filledMap[s[0]];if(!rec)return false;
    return rec.status===dpFilter;
  });
  var lines=[];
  for(var i=0;i<filtered.length;i++){
    var s=filtered[i];var name=s[0];var info='';
    if(dpFmt==='name_room')info=' ('+s[2]+')';
    else if(dpFmt==='name_status'){var isF=filled.has(s[0]);var st=isF?(filledMap[s[0]].status==='buzhusu'?' 不住校':' 住校'):' 未填';info=st+' ('+s[2]+')';}
    lines.push(name+info);
  }
  var text=lines.join('\n');
  navigator.clipboard.writeText(text).catch(function(){
    var ta=document.createElement('textarea');ta.value=text;
    document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
  });
  var btn=event&&event.target?event.target:document.querySelector('.dp-copy-btn');
  var ot=btn.textContent;btn.textContent='✅ 已复制 '+filtered.length+'人';setTimeout(function(){btn.textContent=ot;},1500);
}
function ds(dorm){dpDorm=dorm;renderDP();}
