// ===== 时间窗口检查 =====
function timeCheck(){
  var start=window.wdm_fill_start||'19:00',end=window.wdm_fill_end||'23:30';
  if(start===end)return; // 不限制
  var n=new Date(),h=n.getHours(),m=n.getMinutes(),now=h*60+m;
  var sp=start.split(':'),ep=end.split(':');
  var sMin=parseInt(sp[0])*60+parseInt(sp[1]||0);
  var eMin=parseInt(ep[0])*60+parseInt(ep[1]||0);
  var outer=false;
  if(sMin<eMin){outer=now<sMin||now>eMin;}
  else{outer=now<eMin||now>sMin;} // 跨天
  var tc=document.getElementById('tw');
  if(outer){
    tc.style.display='flex';
    tc.innerHTML='<div style="text-align:center;padding:40px 20px"><div style="font-size:48px;margin-bottom:12px">⏰</div><h2 style="font-size:18px;color:#1e293b;margin-bottom:8px">当前不在填写时间</h2><p style="color:#94a3b8;font-size:14px;max-width:300px;margin:0 auto">填写时间：'+start+' ~ '+end+'<br>请在这个时间段内填写</p></div>';
  }else{tc.style.display='none';tc.innerHTML='';}
}

function ub(){

  localStorage.removeItem('wdm_sid');
  goBind();
}

  var td=new Date().toISOString().slice(0,10);
  var x=new XMLHttpRequest();
  var method=(window.mod||window.rec)?'PATCH':'POST';
  var url=method==='PATCH'?SUPABASE_URL+'/rest/v1/checkins?date=eq.'+td+'&name=eq.'+encodeURIComponent(name):SUPABASE_URL+'/rest/v1/checkins';
  x.open(method,url);
  x.setRequestHeader('apikey',SUPABASE_ANON_KEY);
  x.setRequestHeader('Authorization','Bearer '+SUPABASE_ANON_KEY);
  x.setRequestHeader('Content-Type','application/json');
  x.onload=function(){
    if(x.status>=200&&x.status<300){
      btn.textContent='✅ 已提交';
      document.getElementById('dbx').style.display='block';document.getElementById('fp').style.display='none';
      document.getElementById('dt').textContent='今日已填写 - '+name;
      document.getElementById('di').textContent=(cst==='zaisushe'?'🏠 住校':'🚶 不住校')+(reason?' · '+reason:'');
      window.mod=false;btn.textContent='提交';
    }else{sm('提交失败','err');btn.disabled=false;btn.textContent='提交';}
  };
  x.onerror=function(){sm('网络异常','err');btn.disabled=false;btn.textContent='提交';};
  x.send(JSON.stringify({date:td,name:name,room:room,status:cst,note:reason,student_id:sid}));
}
