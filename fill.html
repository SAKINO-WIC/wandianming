<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>信管2307班晚点名系统-SVIP专属定制版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f8fafc;min-height:100vh}
.header{background:linear-gradient(135deg,#1e293b,#334155);padding:24px 20px 16px;text-align:center;color:#fff;position:relative}
.header .moon{font-size:32px;display:block;margin-bottom:2px;cursor:pointer;user-select:none}
.header h1{font-size:20px;font-weight:600;letter-spacing:1px}
.header .sub{font-size:10px;opacity:.5}
.header .deco{position:absolute;bottom:0;left:0;right:0;height:16px;background:#f8fafc;border-radius:16px 16px 0 0}
.container{max-width:420px;margin:-8px auto 0;padding:0 16px 20px;position:relative;z-index:1}
.card{background:#fff;border-radius:16px;box-shadow:0 1px 8px rgba(0,0,0,.06);padding:20px;margin-bottom:12px}
.field{margin-bottom:14px}
.field-label{font-size:13px;font-weight:500;color:#64748b;margin-bottom:5px}
select,input,textarea{width:100%;padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:16px;color:#1e293b;background:#f8fafc}
select:focus,input:focus,textarea:focus{outline:none;border-color:#3b82f6;background:#fff}
textarea{resize:none}
.hello{text-align:center;margin-bottom:16px}
.hello .icon{font-size:48px;margin-bottom:6px}
.hello h2{font-size:20px;color:#1e293b;margin-bottom:4px}
.hello p{font-size:13px;color:#94a3b8}
.nr{display:flex;gap:8px}
.nr input{flex:1}
.nr .db{width:48px;flex-shrink:0;border:1.5px solid #e2e8f0;border-radius:10px;background:#f1f5f9;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#475569;user-select:none}
.nr .db:active{background:#e2e8f0}
.nw{position:relative}
.np{display:none;position:absolute;top:calc(100%+4px);left:0;right:56px;background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;max-height:210px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:50}
.np.on{display:block}
.np .it{padding:11px 14px;font-size:15px;color:#1e293b;cursor:pointer;border-bottom:1px solid #f1f5f9}
.np .it:last-child{border-bottom:none}
.np .it:active{background:#eff6ff}
.np .it .rt{font-size:12px;color:#94a3b8;margin-left:6px}
.np .empty{padding:20px;text-align:center;color:#94a3b8}
.srow{display:flex;gap:10px}
.sbtn{flex:1;padding:18px 12px;border:1.5px solid #e2e8f0;border-radius:12px;text-align:center;cursor:pointer;transition:all .15s;background:#f8fafc;user-select:none}
.sbtn:active{transform:scale(.97)}
.sbtn .ic{font-size:24px;display:block;margin-bottom:6px}
.sbtn .lb{font-size:16px;font-weight:500;color:#64748b}
.sbtn.hm{border-color:#22c55e;background:#f0fdf4}
.sbtn.hm .lb{color:#16a34a}
.sbtn.aw{border-color:#ef4444;background:#fef2f2}
.sbtn.aw .lb{color:#dc2626}
#rw{overflow:hidden;max-height:0;opacity:0;transition:all .25s}
#rw.on{max-height:140px;opacity:1}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:17px;font-weight:600;cursor:pointer}
.btn-pri{background:#1e293b;color:#fff}
.btn-pri:disabled{background:#cbd5e1;cursor:not-allowed}
.btn-out{background:transparent;color:#3b82f6;border:1.5px solid #3b82f6}
.ub{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;margin-bottom:14px}
.ub .av{width:36px;height:36px;border-radius:50%;background:#22c55e;color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600}
.ub .info{flex:1}
.ub .nm{font-size:15px;font-weight:600;color:#16a34a}
.ub .rm{font-size:11px;color:#94a3b8}
.ub .ubtn{font-size:11px;color:#94a3b8;cursor:pointer;text-decoration:underline;flex-shrink:0}
.msg{padding:12px;border-radius:10px;font-size:14px;margin-bottom:12px;display:none;text-align:center}
.msg.on{display:block}
.msg.ok{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
.msg.err{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
#ae{display:none;text-align:center;margin-top:12px}
#ae.on{display:block}
#ae a{color:#3b82f6;font-size:14px;text-decoration:none;font-weight:500}
.ft{text-align:center;color:#cbd5e1;font-size:11px;margin-top:16px}
.done{padding:20px;text-align:center}
.done .bi{font-size:48px}
.done h2{font-size:18px;margin:8px 0 4px;color:#1e293b}
.done .st{color:#64748b;font-size:14px;margin-bottom:12px}
</style>
</head>
<body>
<div class="header">
<span class="moon" onclick="tm()">🌙</span>
<h1>信管2307班晚点名系统</h1>
<div class="sub">SVIP专属定制版</div>
<div class="deco"></div>
</div>

<div class="container">
<div id="msg" class="msg"></div>

<!-- 绑定页 -->
<div id="bindPage" class="card">
<div class="hello"><div class="icon">👋</div><h2>欢迎使用晚点名</h2><p>首次使用请先绑定身份</p></div>
<div class="field"><div class="field-label">🏠 宿舍</div>
<select id="bd">
<option value="">全部宿舍</option>
<option value="26-521">26-521</option><option value="26-522">26-522</option><option value="26-523">26-523</option>
<option value="26-524">26-524</option><option value="26-525">26-525</option>
<option value="28-535">28-535</option><option value="28-536">28-536</option><option value="28-537">28-537</option><option value="28-538">28-538</option>
</select></div>
<div class="field"><div class="field-label">👤 姓名</div>
<div class="nw">
<div class="nr"><input type="text" id="bn" placeholder="输入或点▼选择" autocomplete="off"><div class="db" id="ndb">▼</div></div>
<div class="np" id="np"></div>
</div></div>
<div class="field"><div class="field-label">🔢 学号</div>
<input type="text" id="bs" inputmode="numeric" placeholder="输入10位学号" maxlength="10"></div>
<button class="btn btn-pri" id="bb">绑定并进入</button>
</div>

<!-- 已提交 -->
<div id="doneBox" class="card" style="display:none;">
<div class="done">
<div class="bi">✅</div>
<h2 id="dt">今日已填写</h2>
<div class="st" id="di"></div>
<button class="btn btn-out" onclick="startMod()">✏️ 修改</button>
</div></div>

<!-- 填表页 -->
<div id="fillPage" class="card" style="display:none;">
<div class="ub">
<div class="av" id="uav"></div>
<div class="info"><div class="nm" id="unm"></div><div class="rm" id="urm"></div></div>
<div class="ubtn" onclick="unbind()">解绑</div>
</div>
<div class="field"><div class="field-label">🏡 今晚状态</div>
<div class="srow">
<div class="sbtn hm" onclick="setSt('zaisushe')"><span class="ic">🏠</span><span class="lb">住校</span></div>
<div class="sbtn" onclick="setSt('buzhusu')"><span class="ic">🚶</span><span class="lb">不住校</span></div>
</div></div>
<div id="rw"><div class="field"><div class="field-label" style="color:#dc2626;">📝 不住校事由 <span style="color:#ef4444;">*必填</span></div><textarea id="ri" rows="2" placeholder="请填写理由…" oninput="ck()"></textarea></div></div>
<button class="btn btn-pri" id="sb" onclick="sub()" disabled>请先绑定身份</button>
</div>

<div id="ae"><a href="admin.html">📊 管理看板</a></div>
<div class="ft">信管2307班晚点名系统 · SVIP专属定制版</div>
</div>

<script>
var SUPABASE_URL='https://jgiyahtmpvfqtgdfxxgi.supabase.co';
var SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpnaXlhaHRtcHZmcXRnZGZ4eGdpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyOTEwNTIsImV4cCI6MjA5NDg2NzA1Mn0.K2XGYGccLv6rfPyuAYVYufhIy1mEpABMHf77Sz1IqZE';
var STUDENTS=[
['蔡名杰','2330130273','26-521'],['曹家乐','2330130274','26-521'],['曹智宣','2330130275','26-521'],['狄梦豪','2330130276','26-521'],['高瑞鹏','2330130277','26-521'],['郭宇峰','2330130278','26-521'],
['缴少博','2330130279','26-522'],['寇翼鹏','2330130280','26-522'],['林宽','2330130281','26-522'],['刘倍源','2330130282','26-522'],['刘春鹏','2330130283','26-522'],['刘运来','2330130284','26-522'],
['吕英豪','2330130285','26-523'],['皮杰','2330130286','26-523'],['万小转','2330130289','26-523'],
['王哲','2330130291','26-524'],['吴泓滨','2330130292','26-524'],['徐昊涵','2330130293','26-524'],['杨昌秀','2330130294','26-524'],['杨雨非','2330130295','26-524'],['张骏意','2330130296','26-524'],
['张天予','2330130297','26-525'],['张志杰','2330130298','26-525'],['赵文宇','2330130299','26-525'],
['蔡文清','2330130300','28-535'],['陈蕾','2330130301','28-535'],['陈萌','2330130302','28-535'],['程研','2330130303','28-535'],['何欣怡','2330130304','28-535'],
['胡亮亮','2330130305','28-536'],['李雅琪','2330130306','28-536'],['梁博文','2330130307','28-536'],['刘瑷烨','2330130308','28-536'],['刘政琪','2330130309','28-536'],['马莹莹','2330130310','28-536'],
['潘玥彤','2330130311','28-537'],['王青青','2330130313','28-537'],['王睿','2330130314','28-537'],['王雨欣','2330130315','28-537'],['杨羽涵','2330130316','28-537'],
['姚蒙娜蝶舞','2330130317','28-538'],['尹润甜','2330130318','28-538'],['喻忠香','2330130319','28-538'],['张文静','2330130320','28-538'],['周凯旋','2330130321','28-538'],['朱思怡','2330130322','28-538']
];

// ===== 管理员入口 =====
var mc=0,mt=null;
function tm(){mc++;clearTimeout(mt);mt=setTimeout(function(){mc=0;},1500);if(mc>=7){mc=0;var e=document.getElementById('ae');e.className=e.className.indexOf('on')>=0?'':'on';}}

// ===== 维护模式检查 =====
(function(){
  if(localStorage.getItem('debug_mode')==='1')return;
  var x=new XMLHttpRequest();
  x.open('GET',SUPABASE_URL+'/rest/v1/settings?select=value&key=eq.maintenance');
  x.setRequestHeader('apikey',SUPABASE_ANON_KEY);
  x.setRequestHeader('Authorization','Bearer '+SUPABASE_ANON_KEY);
  x.onload=function(){if(x.status===200){try{var d=JSON.parse(x.responseText);if(d.length>0&&d[0].value==='1'){document.body.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#f8fafc;padding:40px;text-align:center"><div style="font-size:64px;margin-bottom:16px">🔧</div><h2 style="font-size:22px;color:#1e293b;margin-bottom:8px">系统维护中</h2><p style="color:#94a3b8;max-width:300px">系统正在升级维护，请稍后再来～</p></div>';}}catch(e){}}};
  x.send();
})();

// ===== 绑定页逻辑 =====
function rp(arr){var p=document.getElementById('np');if(!arr||arr.length===0){p.innerHTML='<div class="empty">无匹配</div>';return;}var h='';for(var i=0;i<arr.length;i++){h+='<div class="it" onclick="pn(\''+arr[i][0]+'\',\''+arr[i][1]+'\')">'+arr[i][0]+'<span class="rt">'+arr[i][2]+'</span></div>';}p.innerHTML=h;}
function fl(){var d=document.getElementById('bd').value;var l=STUDENTS;if(d){l=[];for(var i=0;i<STUDENTS.length;i++){if(STUDENTS[i][2]===d)l.push(STUDENTS[i]);}}rp(l);}
function op(){var t=document.getElementById('bn').value.trim();var d=document.getElementById('bd').value;var l=STUDENTS;if(d){l=[];for(var i=0;i<STUDENTS.length;i++){if(STUDENTS[i][2]===d)l.push(STUDENTS[i]);}}if(t){var f=[];for(var i=0;i<l.length;i++){if(l[i][0].indexOf(t)>=0)f.push(l[i]);}l=f;}rp(l);document.getElementById('np').className='np on';}
function cp(){document.getElementById('np').className='np';}
function pn(n,s){document.getElementById('bn').value=n;document.getElementById('bs').value=s;cp();ck();}

document.getElementById('bd').onchange=function(){fl();ck();};
document.getElementById('bn').oninput=function(){if(document.getElementById('np').className.indexOf('on')>=0)op();var v=this.value.trim();for(var i=0;i<STUDENTS.length;i++){if(STUDENTS[i][0]===v){document.getElementById('bs').value=STUDENTS[i][1];break;}}ck();};
document.getElementById('bn').onfocus=function(){op();};
document.getElementById('bn').onblur=function(){var t=this;setTimeout(function(){cp();},200);};
document.getElementById('ndb').onclick=function(){if(document.getElementById('np').className.indexOf('on')>=0)cp();else op();};
document.getElementById('bs').oninput=function(){var s=this.value.trim();if(s.length===10){for(var i=0;i<STUDENTS.length;i++){if(STUDENTS[i][1]===s){document.getElementById('bn').value=STUDENTS[i][0];break;}}}ck();};

function ck(){var n=document.getElementById('bn').value.trim();var s=document.getElementById('bs').value.trim();var ok=false;for(var i=0;i<STUDENTS.length;i++){if(STUDENTS[i][0]===n&&STUDENTS[i][1]===s){ok=true;break;}}document.getElementById('bb').disabled=!ok;}

function onBind(){
  var n=document.getElementById('bn').value.trim();
  var s=document.getElementById('bs').value.trim();
  if(!n){document.getElementById('msg').textContent='⚠️ 请填写姓名';document.getElementById('msg').className='msg on err';return;}
  if(s.length!==10){document.getElementById('msg').textContent='⚠️ 请输入完整的10位学号';document.getElementById('msg').className='msg on err';return;}
  var si=null;for(var i=0;i<STUDENTS.length;i++){if(STUDENTS[i][0]===n&&STUDENTS[i][1]===s){si=i;break;}}
  if(si===null){
    // 试试只看学号
    for(var i=0;i<STUDENTS.length;i++){if(STUDENTS[i][1]===s){document.getElementById('msg').textContent='⚠️ 姓名「'+n+'」与学号不匹配，你是否是「'+STUDENTS[i][0]+'」？';document.getElementById('msg').className='msg on err';return;}}
    document.getElementById('msg').textContent='⚠️ 未找到该学生，请核对姓名和学号';document.getElementById('msg').className='msg on err';return;
  }
  localStorage.setItem('wdm_name',n);
  localStorage.setItem('wdm_sid',s);
  showFill(STUDENTS[si]);
}
document.getElementById('bb').onclick=onBind;

// ===== 填表页逻辑 =====
var st='zaisushe',rec=null,boundStudent=null,modMode=false;
var td=new Date().toISOString().slice(0,10);
var API=SUPABASE_URL+'/rest/v1/checkins';
var H={'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY,'Content-Type':'application/json'};

function showFill(s){
  boundStudent=s;
  document.getElementById('bindPage').style.display='none';
  document.getElementById('fillPage').style.display='block';
  document.getElementById('uav').textContent=s[0][0];
  document.getElementById('unm').textContent=s[0];
  document.getElementById('urm').textContent='学号: '+s[1]+' · '+s[2];
  document.getElementById('sb').textContent='提交';
  document.getElementById('sb').disabled=true;
  fetchRec(s[0]);
}

function showBind(){
  boundStudent=null;modMode=false;
  document.getElementById('fillPage').style.display='none';
  document.getElementById('doneBox').style.display='none';
  document.getElementById('bindPage').style.display='block';
}

function unbind(){
  if(!confirm('解除绑定后需要重新绑定才能填写，确定吗？')) return;
  localStorage.removeItem('wdm_name');
  localStorage.removeItem('wdm_sid');
  showBind();
}

function setSt(v){
  st=v;
  var btns=document.querySelectorAll('.sbtn');
  btns[0].className='sbtn'+(v==='zaisushe'?' hm':'');
  btns[1].className='sbtn'+(v==='buzhusu'?' aw':'');
  document.getElementById('rw').className=v==='buzhusu'?'on':'';
  ck();
}

function ck(){var btn=document.getElementById('sb');var r=document.getElementById('ri').value.trim();btn.disabled=!(st==='zaisushe'||r);}

function fetchRec(name){
  var x=new XMLHttpRequest();
  x.open('GET',API+'?date=eq.'+td+'&name=eq.'+encodeURIComponent(name)+'&select=*');
  x.setRequestHeader('apikey',SUPABASE_ANON_KEY);
  x.setRequestHeader('Authorization','Bearer '+SUPABASE_ANON_KEY);
  x.onload=function(){if(x.status===200){try{var d=JSON.parse(x.responseText);if(d&&d.length>0){rec=d[0];document.getElementById('doneBox').style.display='block';document.getElementById('fillPage').style.display='none';document.getElementById('dt').textContent='今日已填写 - '+d[0].name;document.getElementById('di').textContent=(d[0].status==='zaisushe'?'🏠 住校':'🚶 不住校')+(d[0].note?' · '+d[0].note:'');}}catch(e){}}};
  x.send();
}

function startMod(){
  if(!boundStudent)return;
  modMode=true;
  document.getElementById('doneBox').style.display='none';
  document.getElementById('fillPage').style.display='block';
  if(rec){setSt(rec.status);if(rec.status==='buzhusu'&&rec.note)document.getElementById('ri').value=rec.note;}
  document.getElementById('sb').textContent='✏️ 修改提交';ck();
}

function sub(){
  if(!boundStudent)return;
  var name=boundStudent[0],room=boundStudent[2],sid=boundStudent[1];
  var reason=st==='buzhusu'?document.getElementById('ri').value.trim():'';
  if(st==='buzhusu'&&!reason)return;
  var btn=document.getElementById('sb');btn.disabled=true;btn.textContent='提交中…';
  
  var x=new XMLHttpRequest();
  var method=modMode||rec?'PATCH':'POST';
  var url=method==='PATCH'?API+'?date=eq.'+td+'&name=eq.'+encodeURIComponent(name):API;
  x.open(method,url);
  x.setRequestHeader('apikey',SUPABASE_ANON_KEY);
  x.setRequestHeader('Authorization','Bearer '+SUPABASE_ANON_KEY);
  x.setRequestHeader('Content-Type','application/json');
  x.onload=function(){
    if(x.status>=200&&x.status<300){
      btn.textContent='✅ 已提交';
      document.getElementById('doneBox').style.display='block';
      document.getElementById('fillPage').style.display='none';
      document.getElementById('dt').textContent='今日已填写 - '+name;
      document.getElementById('di').textContent=(st==='zaisushe'?'🏠 住校':'🚶 不住校')+(reason?' · '+reason:'');
      modMode=false;btn.textContent='提交';
    }else{document.getElementById('msg').textContent='提交失败，请重试';document.getElementById('msg').className='msg on err';btn.disabled=false;btn.textContent='提交';}
  };
  x.onerror=function(){document.getElementById('msg').textContent='网络异常，请重试';document.getElementById('msg').className='msg on err';btn.disabled=false;btn.textContent='提交';};
  x.send(JSON.stringify({date:td,name:name,room:room,status:st,note:reason,student_id:sid}));
}

// ===== 初始化 =====
fl();
var sn=localStorage.getItem('wdm_name'),ss=localStorage.getItem('wdm_sid');
if(sn&&ss){
  for(var i=0;i<STUDENTS.length;i++){if(STUDENTS[i][0]===sn&&STUDENTS[i][1]===ss){showFill(STUDENTS[i]);break;}}
}
</script>
</body>
</html>
