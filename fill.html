<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>晚点名</title>
  <script src="js/config.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
    }
    .container {
      max-width: 420px;
      width: 100%;
      margin: 0 auto;
    }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 20px;
      margin-bottom: 12px;
    }
    h1 {
      font-size: 24px;
      color: #1a202c;
      text-align: center;
    }
    .date-badge {
      background: #ebf8ff;
      color: #2b6cb0;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 14px;
      text-align: center;
      margin: 12px 0 16px;
    }
    .form-group { margin-bottom: 14px; }
    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 6px;
    }
    select, input, textarea {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 16px;
      color: #2d3748;
      background: white;
      transition: border-color 0.2s;
    }
    select:focus, input:focus, textarea:focus {
      outline: none;
      border-color: #4299e1;
    }

    /* 宿舍分组选择 */
    .room-group { margin-bottom: 8px; }
    .room-header {
      background: #f7fafc;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #4a5568;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
    }
    .room-header:active { background: #edf2f7; }
    .room-header .arrow { transition: transform 0.2s; }
    .room-header .arrow.open { transform: rotate(180deg); }
    .room-students {
      display: none;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px 0 4px 14px;
    }
    .room-students.open { display: flex; }
    .student-tag {
      padding: 6px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 16px;
      font-size: 14px;
      cursor: pointer;
      background: white;
      color: #2d3748;
      transition: all 0.15s;
    }
    .student-tag.selected {
      background: #4299e1;
      color: white;
      border-color: #4299e1;
    }
    .student-tag:active { transform: scale(0.95); }

    /* 手动输入 */
    .manual-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .manual-row input { flex: 1; }
    .switch-mode {
      color: #4299e1;
      font-size: 13px;
      text-align: center;
      margin-top: 6px;
      cursor: pointer;
    }

    /* 状态选项 */
    .status-row {
      display: flex;
      gap: 10px;
    }
    .status-btn {
      flex: 1;
      padding: 16px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      text-align: center;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }
    .status-btn:active { transform: scale(0.97); }
    .status-btn.checked {
      border-color: #38a169;
      background: #f0fff4;
      color: #276749;
    }
    .status-btn.unchecked {
      border-color: #e53e3e;
      background: #fff5f5;
      color: #9b2c2c;
    }

    #reasonGroup { display: none; }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #4299e1;
      color: white;
    }
    .btn-primary:disabled {
      background: #a0c4e8;
      cursor: not-allowed;
    }
    .btn-primary:active:not(:disabled) { background: #3182ce; }

    .message {
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 12px;
      font-size: 14px;
      display: none;
    }
    .message.success { display: block; background: #f0fff4; color: #276749; border: 1px solid #c6f6d5; }
    .message.error { display: block; background: #fff5f5; color: #9b2c2c; border: 1px solid #fed7d7; }
    .message.loading { display: block; background: #ebf8ff; color: #2b6cb0; border: 1px solid #bee3f8; }

    .hidden { display: none !important; }

    .already-box {
      text-align: center;
      padding: 20px;
    }
    .already-box .big-icon { font-size: 48px; }
    .already-box .status-text {
      font-size: 20px;
      font-weight: 600;
      color: #276749;
      margin: 8px 0;
    }

    .footer {
      text-align: center;
      color: #a0aec0;
      font-size: 12px;
      margin-top: 16px;
    }
    .nav-link {
      text-align: center;
      margin-top: 8px;
    }
    .nav-link a {
      color: #a0aec0;
      font-size: 12px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div style="text-align:center;margin:10px 0 8px;"><span style="font-size:36px;">🌙</span></div>
    <h1>晚点名</h1>
    <div class="date-badge" id="todayDate"></div>

    <!-- 提示消息 -->
    <div id="message" class="message"></div>

    <!-- 已提交状态 -->
    <div id="alreadyBox" class="card hidden">
      <div class="already-box">
        <div class="big-icon">✅</div>
        <div class="status-text">今日已填写</div>
        <div style="color:#718096;font-size:14px;" id="alreadyStatus"></div>
        <div style="color:#a0aec0;font-size:12px;margin-top:4px;" id="alreadyTime"></div>
      </div>
      <p style="text-align:center;color:#718096;font-size:14px;">明天见～</p>
    </div>

    <!-- 填写表单 -->
    <div id="formCard" class="card">

      <!-- 选人方式切换 -->
      <div class="form-group">
        <label>你的名字</label>
        <!-- 按宿舍选 -->
        <div id="roomSelectMode"></div>
        <!-- 手动输入 -->
        <div id="manualMode" class="hidden">
          <div class="manual-row">
            <input type="text" id="manualName" placeholder="直接输入姓名" maxlength="10">
            <input type="text" id="manualRoom" placeholder="寝室号" maxlength="10" style="width:100px;flex-shrink:0;">
          </div>
        </div>
        <div class="switch-mode" id="switchModeBtn">✏️ 没找到名字？手动输入</div>
      </div>

      <!-- 状态 -->
      <div class="form-group">
        <label>今晚状态</label>
        <div class="status-row">
          <div class="status-btn checked" data-value="zaisushe" onclick="setStatus('zaisushe')">🏠 住校</div>
          <div class="status-btn unchecked" data-value="buzhusu" onclick="setStatus('buzhusu')">🚶 不住校</div>
        </div>
      </div>

      <!-- 不住校理由 -->
      <div class="form-group" id="reasonGroup">
        <label>不住校理由 <span style="color:#e53e3e;">*必填</span></label>
        <textarea id="reasonInput" rows="2" placeholder="请填写理由（如：回家、请假、外出等）"></textarea>
      </div>

      <!-- 备注 -->
      <div class="form-group">
        <label>备注（选填）</label>
        <textarea id="noteInput" rows="2" placeholder="其他需要说明的情况…"></textarea>
      </div>

      <!-- 提交 -->
      <button class="btn btn-primary" id="submitBtn" onclick="submitCheckin()">提交</button>
    </div>

    <div class="nav-link"><a href="admin.html">📊 管理员看板</a></div>
    <div class="footer">Made with ❤️ by Hermes</div>
  </div>

  <script>
    // ===== 配置 =====
    const API = SUPABASE_URL + '/rest/v1/checkins';
    const HEADERS = {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
      'Content-Type': 'application/json',
    };

    // ===== 状态 =====
    let selectedStatus = 'zaisushe';
    let selectedName = '';
    let selectedRoom = '';
    let isManual = false;
    let todayStr = new Date().toISOString().slice(0, 10);

    // ===== 显示日期 =====
    const weekdays = ['日','一','二','三','四','五','六'];
    const d = new Date();
    document.getElementById('todayDate').textContent =
      d.getFullYear() + '年' + (d.getMonth()+1) + '月' + d.getDate() + '日 星期' + weekdays[d.getDay()];

    // ===== 加载学生名单 =====
    function loadStudentList() {
      const container = document.getElementById('roomSelectMode');

      // 按楼栋分组
      const groups = {};
      STUDENTS.forEach(s => {
        const building = s.room.split('-')[0];
        if (!groups[building]) groups[building] = {};
        const room = s.room;
        if (!groups[building][room]) groups[building][room] = [];
        groups[building][room].push(s);
      });

      let html = '';
      Object.keys(groups).sort().forEach(building => {
        const rooms = groups[building];
        Object.keys(rooms).sort().forEach(room => {
          const students = rooms[room];
          html += `
            <div class="room-group">
              <div class="room-header" onclick="toggleRoom(this)">
                <span>🏠 ${room}</span>
                <span class="arrow">▼</span>
              </div>
              <div class="room-students">
                ${students.map(s =>
                  `<div class="student-tag" data-name="${s.name}" data-room="${s.room}" onclick="selectStudent(this)">${s.name}</div>`
                ).join('')}
              </div>
            </div>`;
        });
      });
      container.innerHTML = html;

      // 展开寝室时定位到上次选的人
      if (savedName && !isManual) {
        const tag = container.querySelector(`.student-tag[data-name="${savedName}"]`);
        if (tag) {
          // 展开该寝室
          tag.closest('.room-students').classList.add('open');
          tag.closest('.room-students').parentElement.querySelector('.arrow').classList.add('open');
          // 选中
          tag.classList.add('selected');
          selectedName = savedName;
          selectedRoom = tag.dataset.room;
        }
      }
    }

    function toggleRoom(header) {
      const students = header.nextElementSibling;
      const arrow = header.querySelector('.arrow');
      students.classList.toggle('open');
      arrow.classList.toggle('open');
    }

    function selectStudent(el) {
      document.querySelectorAll('.student-tag').forEach(t => t.classList.remove('selected'));
      el.classList.add('selected');
      selectedName = el.dataset.name;
      selectedRoom = el.dataset.room;
      saveToLocal();
      updateSubmitBtn();
    }

    // ===== 切换选人模式 =====
    const savedName = localStorage.getItem('wdm_name') || '';
    const savedRoom = localStorage.getItem('wdm_room') || '';

    document.getElementById('switchModeBtn').addEventListener('click', function() {
      isManual = !isManual;
      document.getElementById('roomSelectMode').classList.toggle('hidden', isManual);
      document.getElementById('manualMode').classList.toggle('hidden', !isManual);
      this.textContent = isManual ? '📋 从宿舍列表选择' : '✏️ 没找到名字？手动输入';

      if (isManual && savedName && !document.querySelector(`.student-tag[data-name="${savedName}"]`)) {
        document.getElementById('manualName').value = savedName;
        document.getElementById('manualRoom').value = savedRoom;
        selectedName = savedName;
        selectedRoom = savedRoom;
        updateSubmitBtn();
      }
    });

    document.getElementById('manualName').addEventListener('input', function() {
      selectedName = this.value.trim();
      updateSubmitBtn();
    });
    document.getElementById('manualRoom').addEventListener('input', function() {
      selectedRoom = this.value.trim();
      if (selectedName) saveToLocal();
    });

    // ===== localStorage 自动保存 =====
    function saveToLocal() {
      if (selectedName) {
        localStorage.setItem('wdm_name', selectedName);
        localStorage.setItem('wdm_room', selectedRoom);
      }
    }

    // ===== 选状态 =====
    function setStatus(val) {
      selectedStatus = val;
      document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('checked', 'unchecked'));
      if (val === 'zaisushe') {
        document.querySelector('.status-btn.checked').classList.add('checked');
        document.getElementById('reasonGroup').style.display = 'none';
      } else {
        document.querySelector('.status-btn.unchecked').classList.add('unchecked');
        document.getElementById('reasonGroup').style.display = 'block';
      }
      updateSubmitBtn();
    }

    function updateSubmitBtn() {
      const nameOk = selectedName.length > 0;
      const reasonOk = selectedStatus === 'zaisushe' || document.getElementById('reasonInput').value.trim().length > 0;
      document.getElementById('submitBtn').disabled = !(nameOk && reasonOk);
    }

    document.getElementById('reasonInput').addEventListener('input', updateSubmitBtn);

    // ===== 查今日是否已填 =====
    async function checkAlready() {
      showMessage('正在加载…', 'loading');
      try {
        const resp = await fetch(API + '?date=eq.' + todayStr + '&name=eq.' + encodeURIComponent(savedName) + '&select=*', {
          headers: HEADERS
        });
        if (!resp.ok) throw new Error('网络错误');
        const data = await resp.json();
        if (data && data.length > 0) {
          const r = data[0];
          document.getElementById('alreadyBox').classList.remove('hidden');
          document.getElementById('formCard').classList.add('hidden');
          document.getElementById('alreadyStatus').textContent = r.status === 'zaisushe' ? '🏠 住校' : '🚶 不住校';
          if (r.status === 'buzhusu' && r.note) {
            document.getElementById('alreadyStatus').textContent += ' · ' + r.note;
          }
          document.getElementById('alreadyTime').textContent = '提交时间：' + new Date(r.created_at).toLocaleTimeString('zh-CN');
        }
        hideMessage();
      } catch(e) {
        hideMessage();
        // 静默失败，让用户正常填
      }
    }

    // ===== 提交 =====
    async function submitCheckin() {
      if (document.getElementById('submitBtn').disabled) return;

      const name = isManual ? document.getElementById('manualName').value.trim() : selectedName;
      const room = isManual ? document.getElementById('manualRoom').value.trim() : selectedRoom;
      const status = selectedStatus;
      const reason = selectedStatus === 'buzhusu' ? document.getElementById('reasonInput').value.trim() : '';
      const note = document.getElementById('noteInput').value.trim();
      const fullNote = reason ? reason + (note ? ' | ' + note : '') : note;

      if (!name) { showMessage('请选择或输入姓名', 'error'); return; }
      if (selectedStatus === 'buzhusu' && !reason) { showMessage('不住校请填写理由', 'error'); return; }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = '提交中…';
      showMessage('正在提交…', 'loading');

      try {
        const resp = await fetch(API, {
          method: 'POST',
          headers: HEADERS,
          body: JSON.stringify({
            date: todayStr,
            name: name,
            room: room,
            status: status,
            note: fullNote,
          })
        });

        if (resp.status === 201) {
          showMessage('✅ 提交成功！今晚好好休息～', 'success');
          btn.textContent = '✅ 已提交';
          document.getElementById('formCard').classList.add('hidden');
          document.getElementById('alreadyBox').classList.remove('hidden');
          document.getElementById('alreadyStatus').textContent = status === 'zaisushe' ? '🏠 住校' : '🚶 不住校';
          document.getElementById('alreadyTime').textContent = '';
        } else if (resp.status === 409 || resp.status === 400) {
          const err = await resp.json();
          showMessage('今天已经提交过了！', 'success');
          document.getElementById('formCard').classList.add('hidden');
          document.getElementById('alreadyBox').classList.remove('hidden');
        } else {
          const err = await resp.json();
          showMessage('提交失败：' + (err.message || '网络错误'), 'error');
          btn.disabled = false;
          btn.textContent = '提交';
        }
      } catch(e) {
        showMessage('提交失败：网络异常，请稍后再试', 'error');
        btn.disabled = false;
        btn.textContent = '提交';
      }
    }

    function showMessage(text, type) {
      const m = document.getElementById('message');
      m.textContent = text;
      m.className = 'message ' + type;
    }
    function hideMessage() {
      document.getElementById('message').className = 'message';
    }

    // ===== 初始化 =====
    // 先渲染UI（不依赖网络）
    loadStudentList();

    // 恢复上次选的名字
    if (savedName) {
      // 检查是否在名单里
      const found = STUDENTS.find(s => s.name === savedName);
      if (!found) {
        // 不在名单里 → 自动切手动模式
        document.getElementById('switchModeBtn').click();
        document.getElementById('manualName').value = savedName;
        document.getElementById('manualRoom').value = savedRoom || '';
        selectedName = savedName;
        selectedRoom = savedRoom || '';
        updateSubmitBtn();
      }
    }

    // 异步检查是否已提交（网络请求，不阻塞UI）
    if (savedName) {
      checkAlready();
    }
  </script>
</body>
</html>
