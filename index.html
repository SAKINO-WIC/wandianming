<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>信管2307班晚点名系统-SVIP专属定制版</title>
  <script src="js/config.js?v=20260521"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f8fafc;min-height:100vh}
    .header{background:linear-gradient(135deg,#1e293b,#334155);padding:28px 20px 20px;text-align:center;color:#fff;position:relative}
    .header .moon{font-size:36px;display:block;margin-bottom:4px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
    .header h1{font-size:24px;font-weight:600;letter-spacing:2px}
    .header .date{font-size:13px;opacity:.7;margin-top:4px;margin-bottom:10px}
    .header .deco{position:absolute;bottom:0;left:0;right:0;height:16px;background:#f8fafc;border-radius:16px 16px 0 0}
    .container{max-width:420px;margin:-8px auto 0;padding:0 16px 20px;position:relative;z-index:1}
    .card{background:#fff;border-radius:16px;box-shadow:0 1px 8px rgba(0,0,0,.06);padding:24px;margin-bottom:12px}

    .hello{text-align:center;margin-bottom:20px}
    .hello .icon{font-size:48px;margin-bottom:8px}
    .hello h2{font-size:20px;color:#1e293b;margin-bottom:4px}
    .hello p{font-size:13px;color:#94a3b8}

    .field{margin-bottom:14px}
    .field-label{font-size:13px;font-weight:500;color:#64748b;margin-bottom:5px}
    select,input{width:100%;padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:16px;color:#1e293b;background:#f8fafc;transition:all .15s}
    select:focus,input:focus{outline:none;border-color:#3b82f6;background:#fff}

    .nr{display:flex;gap:8px;align-items:stretch}
    .nr input{flex:1}
    .nr .drop-btn{
      width:48px;flex-shrink:0;border:1.5px solid #e2e8f0;border-radius:10px;
      background:#f1f5f9;font-size:18px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;user-select:none;color:#475569
    }
    .nr .drop-btn:active{background:#e2e8f0;transform:scale(.95)}
    .nr-wrap{position:relative}
    .name-panel{
      display:none;position:absolute;top:calc(100%+4px);left:0;right:56px;
      background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;
      max-height:200px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:50
    }
    .name-panel.on{display:block}
    .name-panel .it{padding:11px 14px;font-size:15px;color:#1e293b;cursor:pointer;border-bottom:1px solid #f1f5f9}
    .name-panel .it:last-child{border-bottom:none}
    .name-panel .it:active{background:#eff6ff}
    .name-panel .it .rt{font-size:12px;color:#94a3b8;margin-left:6px}
    .name-panel .empty{padding:20px;text-align:center;color:#94a3b8;font-size:14px}

    .btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:17px;font-weight:600;cursor:pointer;transition:all .15s}
    .btn-pri{background:#1e293b;color:#fff}
    .btn-pri:active{background:#334155}
    .btn-pri:disabled{background:#cbd5e1;cursor:not-allowed}

    .msg{padding:12px;border-radius:10px;font-size:14px;margin-bottom:12px;display:none;text-align:center}
    .msg.on{display:block}
    .msg.ok{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
    .msg.err{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}

    .redirecting{text-align:center;padding:40px 0}
    .redirecting .spinner{font-size:40px;margin-bottom:12px;animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    .redirecting p{color:#94a3b8;font-size:14px}

    /* 隐藏管理员入口 */
    #adminEntry{display:none;text-align:center;margin-top:12px;animation:fadeIn .3s}
    #adminEntry.on{display:block}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    #adminEntry a{color:#3b82f6;font-size:14px;text-decoration:none;font-weight:500}

    .ft{text-align:center;color:#cbd5e1;font-size:11px;margin-top:20px}
  </style>
</head>
<body>
<div class="header">
  <span class="moon" id="moonIcon" ontouchstart="tapMoon()" onclick="tapMoon()">🌙</span>
      <h1>信管2307班晚点名系统</h1>
      <p style="font-size:11px;color:rgba(255,255,255,.5);margin-top:-4px;margin-bottom:10px;">SVIP专属定制版</p>
  <div class="deco"></div>
</div>

<div class="container">
  <div id="msg" class="msg"></div>

  <!-- 绑定页（未绑定用户看到） -->
  <div id="bindCard" class="card">
    <div class="hello">
      <div class="icon">👋</div>
      <h2>信管2307班晚点名系统</h2>
      <p style="font-size:11px;color:#94a3b8;margin-bottom:4px;">SVIP专属定制版</p>
      <p>首次使用请先绑定身份，后续自动识别</p>
    </div>
    <div class="field">
      <div class="field-label">🏠 宿舍</div>
      <select id="bindDorm" onchange="filterNames()"><option value="">全部宿舍</option></select>
    </div>
    <div class="field">
      <div class="field-label">👤 姓名</div>
      <div class="nr-wrap">
        <div class="nr">
          <input type="text" id="bindName" placeholder="输入姓名或点 ▼ 选择" autocomplete="off" oninput="onNameInput()">
          <div class="drop-btn" id="nameDropBtn" onclick="togglePanel()">▼</div>
        </div>
        <div class="name-panel" id="namePanel"></div>
      </div>
    </div>
    <div class="field">
      <div class="field-label">🔢 学号</div>
      <input type="text" id="bindSid" inputmode="numeric" placeholder="输入10位学号" maxlength="10"
             oninput="onSid()" onkeydown="if(event.key==='Enter')doBind()">
    </div>
    <button class="btn btn-pri" id="bindBtn" onclick="doBind()" disabled>绑定并进入</button>
  </div>

  <!-- 跳转中（已绑定用户看到） -->
  <div id="boundCard" class="card" style="display:none;">
    <div class="hello">
      <div class="icon">🌙</div>
      <h2>欢迎回来</h2>
      <p id="boundWelcome"></p>
      <div style="margin-top:16px;">
        <button class="btn btn-pri" onclick="location.href='fill.html'">✍️ 进入晚点名</button>
      </div>
      <p style="text-align:center;color:#94a3b8;font-size:12px;margin-top:12px;">
        👤 <span id="boundName"></span> · <span id="boundRoom"></span>
      </p>
    </div>
  </div>

  <!-- 隐藏管理员入口 -->
  <div id="adminEntry"><a href="admin.html">📊 管理看板</a></div>

  <div class="ft">信管2307班晚点名系统 · SVIP专属定制版</div>
</div>

<script>
  const H = {'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY};

  // ===== 日期 =====
  const wd=['日','一','二','三','四','五','六'];const D=new Date();
  document.getElementById('td').textContent=D.getFullYear()+'年'+(D.getMonth()+1)+'月'+D.getDate()+'日 星期'+wd[D.getDay()];

  // ===== 隐藏管理员入口（点🌙7次）=====
  let moonClicks=0,moonTimer=null;
  function tapMoon(){
    moonClicks++;
    clearTimeout(moonTimer);
    moonTimer=setTimeout(()=>{moonClicks=0;},1500);
    if(moonClicks>=7){
      moonClicks=0;
      document.getElementById('adminEntry').classList.toggle('on');
    }
  }

  // ===== 宿舍列表 =====
  const dorms=[...new Set(STUDENTS.map(s=>s.room))].sort();
  const bd=document.getElementById('bindDorm');
  dorms.forEach(r=>{const o=document.createElement('option');o.value=r;o.textContent=r;bd.appendChild(o)});

  function filterNames(){
    const dorm=bd.value;
    // 更新面板
    let list=STUDENTS;if(dorm)list=list.filter(s=>s.room===dorm);
    renderPanel(list);
    // 如果输入框有值，检查是否匹配
    const val=document.getElementById('bindName').value.trim();
    if(val&&!STUDENTS.find(x=>x.name===val)){document.getElementById('bindSid').value='';}
    ck();
  }

  // ===== 姓名面板 =====
  function renderPanel(list){
    const p=document.getElementById('namePanel');
    if(!list||!list.length){p.innerHTML='<div class="empty">无匹配</div>';return;}
    p.innerHTML=list.map(s=>'<div class="it" onclick="pickName(\''+s.name+'\')">'+s.name+'<span class="rt">'+s.room+'</span></div>').join('');
  }

  let pTimer=null;
  function openPanel(filtered){
    clearTimeout(pTimer);
    const dorm=bd.value;
    let list=STUDENTS;if(dorm)list=list.filter(s=>s.room===dorm);
    if(filtered){
      const txt=document.getElementById('bindName').value.trim();
      if(txt)list=list.filter(s=>s.name.includes(txt)||s.room.includes(txt));
    }
    renderPanel(list);
    document.getElementById('namePanel').classList.add('on');
    document.getElementById('nameDropBtn').classList.add('on');
  }
  function closePanel(){
    document.getElementById('namePanel').classList.remove('on');
    document.getElementById('nameDropBtn').classList.remove('on');
  }
  function togglePanel(){
    if(document.getElementById('namePanel').classList.contains('on')){closePanel();}
    else{openPanel(false);} // 点按钮显示全部
  }
  function pickName(name){
    document.getElementById('bindName').value=name;
    const s=STUDENTS.find(x=>x.name===name);
    if(s)document.getElementById('bindSid').value=s.sid;
    closePanel();
    ck();
  }
  function onNameInput(){
    const p=document.getElementById('namePanel');
    if(p.classList.contains('on')){openPanel(true);} // 打字时筛选
    const val=document.getElementById('bindName').value.trim();
    const s=STUDENTS.find(x=>x.name===val);
    if(s)document.getElementById('bindSid').value=s.sid;
    ck();
  }

  function onSid(){
    const sid=document.getElementById('bindSid').value.trim();
    if(sid.length===10){
      const s=STUDENTS.find(x=>x.sid===sid);
      if(s&&!sn.value)sn.value=s.name;
    }
    ck();
  }

  function ck(){
    const name=document.getElementById('bindName').value.trim();
    const sid=document.getElementById('bindSid').value.trim();
    document.getElementById('bindBtn').disabled=!STUDENTS.find(x=>x.name===name&&x.sid===sid);
  }

  function doBind(){
    const name=document.getElementById('bindName').value.trim();
    const sid=document.getElementById('bindSid').value.trim();
    if(!STUDENTS.find(x=>x.name===name&&x.sid===sid))return msg('⚠️ 姓名与学号不匹配','err');
    localStorage.setItem('wdm_name',name);
    localStorage.setItem('wdm_sid',sid);
    msg('✅ 绑定成功，正在跳转…','ok');
    setTimeout(()=>{location.href='fill.html';},600);
  }

  function msg(t,type){const m=document.getElementById('msg');m.textContent=t;m.className='msg on '+type;}

  // ===== 初始化 =====
  filterNames();

  // 已绑定用户显示欢迎页
  const sn_=localStorage.getItem('wdm_name'),ss_=localStorage.getItem('wdm_sid');
  if(sn_&&ss_){
    const s=STUDENTS.find(x=>x.name===sn_&&x.sid===ss_);
    if(s){
      document.getElementById('bindCard').style.display='none';
      document.getElementById('boundCard').style.display='block';
      document.getElementById('boundWelcome').textContent='已绑定 '+s.name+'，点击进入晚点名';
      document.getElementById('boundName').textContent=s.name;
      document.getElementById('boundRoom').textContent=s.room;
    }
  }
</script>
</body>
</html>
