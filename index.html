<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>信管2307班晚点名系统-SVIP专属定制版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f8fafc;min-height:100vh}
.header{background:linear-gradient(135deg,#1e293b,#334155);padding:28px 20px 16px;text-align:center;color:#fff;position:relative}
.header .moon{font-size:36px;display:block;margin-bottom:4px;cursor:pointer;user-select:none}
.header h1{font-size:20px;font-weight:600;letter-spacing:1px}
.header .sub{font-size:11px;opacity:.5;margin-top:-2px;margin-bottom:6px}
.header .deco{position:absolute;bottom:0;left:0;right:0;height:16px;background:#f8fafc;border-radius:16px 16px 0 0}
.container{max-width:420px;margin:-8px auto 0;padding:0 16px 20px;position:relative;z-index:1}
.card{background:#fff;border-radius:16px;box-shadow:0 1px 8px rgba(0,0,0,.06);padding:24px;margin-bottom:12px}
.hello{text-align:center;margin-bottom:20px}
.hello .icon{font-size:48px;margin-bottom:8px}
.hello h2{font-size:20px;color:#1e293b;margin-bottom:4px}
.hello p{font-size:13px;color:#94a3b8}
.field{margin-bottom:14px}
.field-label{font-size:13px;font-weight:500;color:#64748b;margin-bottom:5px}
select,input{width:100%;padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:16px;color:#1e293b;background:#f8fafc}
select:focus,input:focus{outline:none;border-color:#3b82f6;background:#fff}

/* 姓名输入+下拉按钮 */
.nr{display:flex;gap:8px}
.nr input{flex:1}
.nr .db{width:48px;flex-shrink:0;border:1.5px solid #e2e8f0;border-radius:10px;background:#f1f5f9;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#475569;user-select:none;-webkit-tap-highlight-color:transparent}
.nr .db:active{background:#e2e8f0}
.nw{position:relative}
.np{display:none;position:absolute;top:calc(100%+4px);left:0;right:56px;background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;max-height:210px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:50}
.np.on{display:block}
.np .it{padding:11px 14px;font-size:15px;color:#1e293b;cursor:pointer;border-bottom:1px solid #f1f5f9}
.np .it:last-child{border-bottom:none}
.np .it:active{background:#eff6ff}
.np .it .rt{font-size:12px;color:#94a3b8;margin-left:6px}
.np .empty{padding:20px;text-align:center;color:#94a3b8;font-size:14px}

.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:17px;font-weight:600;cursor:pointer}
.btn-pri{background:#1e293b;color:#fff}
.btn-pri:disabled{background:#cbd5e1;cursor:not-allowed}
.msg{padding:12px;border-radius:10px;font-size:14px;margin-bottom:12px;display:none;text-align:center}
.msg.on{display:block}
.msg.ok{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
.msg.err{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
#ae{display:none;text-align:center;margin-top:12px}
#ae.on{display:block}
#ae a{color:#3b82f6;font-size:14px;text-decoration:none;font-weight:500}
.ft{text-align:center;color:#cbd5e1;font-size:11px;margin-top:20px}
</style>
</head>
<body>
<div class="header">
<span class="moon" onclick="tm()">🌙</span>
<h1>信管2307班晚点名系统</h1>
<div class="sub">SVIP专属定制版</div>
<div class="deco"></div>
</div>

<div class="container">
<div id="msg" class="msg"></div>

<!-- 绑定页 -->
<div id="bc" class="card">
<div class="hello"><div class="icon">👋</div><h2>信管2307班晚点名系统</h2><p style="font-size:11px;color:#94a3b8;margin-bottom:4px;">SVIP专属定制版</p><p>首次使用请先绑定身份</p></div>

<div class="field"><div class="field-label">🏠 宿舍</div>
<select id="bd">
<option value="">全部宿舍</option>
<option value="26-521">26-521</option><option value="26-522">26-522</option><option value="26-523">26-523</option>
<option value="26-524">26-524</option><option value="26-525">26-525</option>
<option value="28-535">28-535</option><option value="28-536">28-536</option><option value="28-537">28-537</option><option value="28-538">28-538</option>
</select></div>

<div class="field"><div class="field-label">👤 姓名</div>
<div class="nw">
<div class="nr">
<input type="text" id="bn" placeholder="输入姓名或点▼选择" autocomplete="off">
<div class="db" id="ndb">▼</div>
</div>
<div class="np" id="np"></div>
</div></div>

<div class="field"><div class="field-label">🔢 学号</div>
<input type="text" id="bs" inputmode="numeric" placeholder="输入10位学号" maxlength="10">
</div>

<button class="btn btn-pri" id="bb" disabled>绑定并进入</button>
</div>

<!-- 欢迎页 -->
<div id="wc" class="card" style="display:none;">
<div class="hello"><div class="icon">🌙</div><h2>欢迎回来</h2><p id="ww"></p>
<div style="margin-top:16px;"><button class="btn btn-pri" onclick="location.href='fill.html'">✍️ 进入晚点名</button></div>
<p style="text-align:center;color:#94a3b8;font-size:12px;margin-top:12px;" id="wi"></p></div>
</div>

<div id="ae"><a href="admin.html">📊 管理看板</a></div>
<div class="ft">信管2307班晚点名系统 · SVIP专属定制版</div>
</div>

<script>
// ===== 配置 =====
var SUPABASE_URL='https://jgiyahtmpvfqtgdfxxgi.supabase.co';
var SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpnaXlhaHRtcHZmcXRnZGZ4eGdpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyOTEwNTIsImV4cCI6MjA5NDg2NzA1Mn0.K2XGYGccLv6rfPyuAYVYufhIy1mEpABMHf77Sz1IqZE';
var STUDENTS=[
['蔡名杰','2330130273','26-521'],['曹家乐','2330130274','26-521'],['曹智宣','2330130275','26-521'],['狄梦豪','2330130276','26-521'],['高瑞鹏','2330130277','26-521'],['郭宇峰','2330130278','26-521'],
['缴少博','2330130279','26-522'],['寇翼鹏','2330130280','26-522'],['林宽','2330130281','26-522'],['刘倍源','2330130282','26-522'],['刘春鹏','2330130283','26-522'],['刘运来','2330130284','26-522'],
['吕英豪','2330130285','26-523'],['皮杰','2330130286','26-523'],['万小转','2330130289','26-523'],
['王哲','2330130291','26-524'],['吴泓滨','2330130292','26-524'],['徐昊涵','2330130293','26-524'],['杨昌秀','2330130294','26-524'],['杨雨非','2330130295','26-524'],['张骏意','2330130296','26-524'],
['张天予','2330130297','26-525'],['张志杰','2330130298','26-525'],['赵文宇','2330130299','26-525'],
['蔡文清','2330130300','28-535'],['陈蕾','2330130301','28-535'],['陈萌','2330130302','28-535'],['程研','2330130303','28-535'],['何欣怡','2330130304','28-535'],
['胡亮亮','2330130305','28-536'],['李雅琪','2330130306','28-536'],['梁博文','2330130307','28-536'],['刘瑷烨','2330130308','28-536'],['刘政琪','2330130309','28-536'],['马莹莹','2330130310','28-536'],
['潘玥彤','2330130311','28-537'],['王青青','2330130313','28-537'],['王睿','2330130314','28-537'],['王雨欣','2330130315','28-537'],['杨羽涵','2330130316','28-537'],
['姚蒙娜蝶舞','2330130317','28-538'],['尹润甜','2330130318','28-538'],['喻忠香','2330130319','28-538'],['张文静','2330130320','28-538'],['周凯旋','2330130321','28-538'],['朱思怡','2330130322','28-538']
];

// ===== 姓名面板 =====
function rp(arr){
  var p=document.getElementById('np');
  if(!arr||arr.length===0){p.innerHTML='<div class="empty">无匹配</div>';return;}
  var h='';
  for(var i=0;i<arr.length;i++){
    h+='<div class="it" onclick="pn(\''+arr[i][0]+'\',\''+arr[i][1]+'\')">'+arr[i][0]+'<span class="rt">'+arr[i][2]+'</span></div>';
  }
  p.innerHTML=h;
}

function fl(){
  var dorm=document.getElementById('bd').value;
  var list=STUDENTS;
  if(dorm){list=[];for(var i=0;i<STUDENTS.length;i++){if(STUDENTS[i][2]===dorm)list.push(STUDENTS[i]);}}
  rp(list);
}

function op(){
  var txt=document.getElementById('bn').value.trim();
  var dorm=document.getElementById('bd').value;
  var list=STUDENTS;
  if(dorm){list=[];for(var i=0;i<STUDENTS.length;i++){if(STUDENTS[i][2]===dorm)list.push(STUDENTS[i]);}}
  if(txt){var f=[];for(var i=0;i<list.length;i++){if(list[i][0].indexOf(txt)>=0)f.push(list[i]);}list=f;}
  rp(list);
  document.getElementById('np').className='np on';
}

function cp(){document.getElementById('np').className='np';}

function pn(name,sid){
  document.getElementById('bn').value=name;
  document.getElementById('bs').value=sid;
  cp();
  ck();
}

// ===== 事件绑定 =====
document.getElementById('bd').onchange=function(){fl();ck();};
document.getElementById('bn').oninput=function(){
  if(document.getElementById('np').className.indexOf('on')>=0)op();
  var v=this.value.trim();
  for(var i=0;i<STUDENTS.length;i++){if(STUDENTS[i][0]===v){document.getElementById('bs').value=STUDENTS[i][1];break;}}
  ck();
};
document.getElementById('bn').onfocus=function(){op();};
document.getElementById('bn').onblur=function(){var t=this;setTimeout(function(){cp();},200);};
document.getElementById('ndb').onclick=function(){
  if(document.getElementById('np').className.indexOf('on')>=0)cp();
  else op();
};
document.getElementById('bs').oninput=function(){
  var s=this.value.trim();
  if(s.length===10){
    for(var i=0;i<STUDENTS.length;i++){if(STUDENTS[i][1]===s){document.getElementById('bn').value=STUDENTS[i][0];break;}}
  }
  ck();
};

function ck(){
  var n=document.getElementById('bn').value.trim();
  var s=document.getElementById('bs').value.trim();
  var ok=false;
  for(var i=0;i<STUDENTS.length;i++){if(STUDENTS[i][0]===n&&STUDENTS[i][1]===s){ok=true;break;}}
  document.getElementById('bb').disabled=!ok;
}

function db(){
  var n=document.getElementById('bn').value.trim();
  var s=document.getElementById('bs').value.trim();
  var ok=false;
  for(var i=0;i<STUDENTS.length;i++){if(STUDENTS[i][0]===n&&STUDENTS[i][1]===s){ok=true;break;}}
  if(!ok){document.getElementById('msg').textContent='⚠️ 姓名与学号不匹配';document.getElementById('msg').className='msg on err';return;}
  localStorage.setItem('wdm_name',n);
  localStorage.setItem('wdm_sid',s);
  document.getElementById('msg').textContent='✅ 绑定成功，正在跳转…';document.getElementById('msg').className='msg on ok';
  setTimeout(function(){location.href='fill.html';},600);
}
document.getElementById('bb').onclick=db;

// ===== 管理员入口（点🌙7次）=====
var mc=0,mt=null;
function tm(){mc++;clearTimeout(mt);mt=setTimeout(function(){mc=0;},1500);if(mc>=7){mc=0;var e=document.getElementById('ae');if(e.className.indexOf('on')>=0)e.className='';else e.className='on';}}

// ===== 维护模式 =====
(function(){
  if(localStorage.getItem('debug_mode')==='1')return;
  var x=new XMLHttpRequest();
  x.open('GET',SUPABASE_URL+'/rest/v1/settings?select=value&key=eq.maintenance');
  x.setRequestHeader('apikey',SUPABASE_ANON_KEY);
  x.setRequestHeader('Authorization','Bearer '+SUPABASE_ANON_KEY);
  x.onload=function(){
    if(x.status===200){
      try{
        var d=JSON.parse(x.responseText);
        if(d.length>0&&d[0].value==='1'){
          document.body.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#f8fafc;padding:40px;text-align:center"><div style="font-size:64px;margin-bottom:16px">🔧</div><h2 style="font-size:22px;color:#1e293b;margin-bottom:8px">系统维护中</h2><p style="color:#94a3b8;max-width:300px">系统正在升级维护，暂不可用，请稍后再来～</p></div>';
        }
      }catch(e){}
    }
  };
  x.send();
})();

// ===== 已绑定用户 =====
var sn=localStorage.getItem('wdm_name');
var ss=localStorage.getItem('wdm_sid');
if(sn&&ss){
  var found=false,si=null;
  for(var i=0;i<STUDENTS.length;i++){if(STUDENTS[i][0]===sn&&STUDENTS[i][1]===ss){found=true;si=i;break;}}
  if(found){
    document.getElementById('bc').style.display='none';
    document.getElementById('wc').style.display='block';
    document.getElementById('ww').textContent='欢迎回来，'+sn;
    document.getElementById('wi').textContent='👤 '+sn+' · '+STUDENTS[si][2];
  }
}

// 初始渲染面板
fl();
</script>
</body>
</html>
