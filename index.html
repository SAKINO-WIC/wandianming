body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f8fafc;min-height:100vh}
.header{background:linear-gradient(135deg,#1e293b,#334155);padding:28px 20px 16px;text-align:center;color:#fff;position:relative}
.header .moon{font-size:36px;display:block;margin-bottom:4px;cursor:pointer;user-select:none}

.header .deco{position:absolute;bottom:0;left:0;right:0;height:16px;background:#f8fafc;border-radius:16px 16px 0 0}
.container{max-width:420px;margin:-8px auto 0;padding:0 16px 20px}
.card{background:#fff;border-radius:16px;box-shadow:0 1px 8px rgba(0,0,0,.06);padding:24px;margin-bottom:12px}
.hello{text-align:center;margin-bottom:20px}
.hello .icon{font-size:48px;margin-bottom:8px}

.field{margin-bottom:14px}
.field-label{font-size:13px;font-weight:500;color:#64748b;margin-bottom:5px}
select,input{width:100%;padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:16px;color:#1e293b;background:#f8fafc}
:focus{outline:none;border-color:#3b82f6!important;background:#fff}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:17px;font-weight:600;cursor:pointer}
.btn-pri{background:#1e293b;color:#fff}
.btn-pri:disabled{background:#cbd5e1;cursor:not-allowed}
.msg{padding:12px;border-radius:10px;font-size:14px;margin-bottom:12px;display:none;text-align:center}
.msg.on{display:block}
.msg.ok{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
.msg.err{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.ft{text-align:center;color:#cbd5e1;font-size:11px;margin-top:20px}
#ae{display:none;text-align:center;margin-top:12px}
#ae.on{display:block}
#ae a{color:#3b82f6;font-size:14px;text-decoration:none}
</style>
</head>

};
